body:
  text: 卷上外症用刀針法針灸為醫門一科須得名師傳授遇病始能按穴刺灸立起沉疴奈其人罕觀余曾得異傳用銀絲長五寸銼尖兩頭每逢痞塊癥瘕腹痛陰疽風寒濕痹周身串疼等症非針不效患者肉厚可刺寸許肉薄者約刺四五分次以紙疊折寸半厚中錐一孔套入針內又以生薑厚片亦中錐一孔套加紙上安艾絨灸之雖經時久不覺疼痛且易愈病出針後按症貼膏藥並進湯藥陽癰焮腫有日漸覺抽痛以右食指遍捺患上有一點軟陷處內膿已成用右食指與大指掐住披刀響銅打的披刀之口向上輕輕斜刺患上肉厚者刺深肉薄者刺淺捺盡膿水插藥紙捻於孔內貼以膏藥倘癰勢延大膿孔兜住難出待數日後皮肉穿薄順其下流處再開一口泄淨膿毒方易收功果膿未熟門開過早有翻花腫凸之害若肌肉太厚刀不能透以火針在燈火上燒紅一烙孔口插藥捻外貼膏藥背與腹用火針要斜刺方不傷內膜害人惟手足針可直入凡頭面及疔瘡對口搭背等症俱不可用火針閉毒助火生變陰疽多堅腫驟難成膿不易消退惟烙以細火針以回其陽其針數多寡量病形之大小外敷溫散藥過四日一換如胸背生症用針斜刺為要驗膿熟之訣以右食指捺有軟處須粗火針烙之陰疽附骨披刀不能透孔內插藥捻隨貼膏藥倘膿兜塞數日後順下流處再烙則膿易淨若針處肉厚烙口不張以骨針穿透其口即插藥捻貼膏藥過二三日方能見膿若患口內膿多壅塞難出果然皮肉薄者隨插拔膿管釣動膿勢自從管中湧出管式另詳背部與胸膺刺艾針當以左食指與大指捏起患處厚皮然後量意針入二三分因臟腑皆繫於背而胸前為心之宮城肌肉澆薄恐有傷犯惟腹肚內空可刺寸許其餘之處臨針時均宜用大指掐緊穴道讓過大筋再刺遂不知疼亦無所礙凡用刀針時令患者口內先含桂元肉八枚以接補元氣方不暈脫若老人幼孩及病久虛體者皆難忍痛不可草率動手猝有昏脫之變喉內舌下兩邊生起纍纍疙瘩吞吐不快名曰甸氣或舌根當中生肉球如櫻桃此為梅核皆肝氣所致用烙鐵在燈火上燒紅以左手執捺舌捺開口右手持烙鐵輕輕烙之以烙平為度內進逍遙散外吹冰硼散半月平復烙鐵用鐵打成烙頭如半粒小蠶豆大烙柄以棉線繞緊燒紅時方不燙手若以銅烙燒紅多熔化入喉傷入性命決不可用大火針陰疽放膿所用先以筆桿竹長二寸為柄次用粗鐵絲三寸插入竹內外餘一寸銼尖竹杆兩頭用細鐵絲塞牢方不脫落若發散陰疽用細火針但以細鐵絲仿上做法亦在燈火燒紅看疽勢大小量意用針幾下切不可用銅火針見火易熔化誤人不淺艾針用細銀絲寸許或二寸長者一頭銼尖一頭繞銅絲作柄每遇寒濕侵入經絡肢體走串痠痛安艾炷灸之喉內諸症不可輕漫用刀刺恐日後易於復發果腫處膿熟必起軟小點或生小白頭方可用刀刺出膿血立時能見鬆快火針不可輕用火針又名燔針為外症所必用能決膿癰消散陰疽惟紅腫焮痛火毒旺者誤用更腫痛深潰頭面為諸陽總會一用火針引火閉邪使輕病轉危矣治筋縮法隱曲處生癰疽膿水日久潰多夫膿為血液與肌肉所化而成血脈已枯束骨之筋失其滋養故筋縮不得屈伸待完口時外以青蔥新艾煎湯先熏後洗內進十全大補湯俾氣旺血充筋得舒潤再加時常以手揉抹患上或扯之左或拽之右或伸之前或屈之後不拘手足身體如此行之無間約月餘則骨節可活氣血可通筋脈可舒自必復原歸舊若肌肉爛深大筋已斷雖然肌生口斂必有曲無直或直不得曲終成廢疾治足筋縮法腿足生癰疽膿水去多筋無榮養故易短縮乘完口時用二尺長酒杯粗竹子一段帶於身旁時常放地上將患足踏其上推轉來去活動筋脈約月餘即和活如舊矣浮皮兜膿須剪開癰疽潰膿日久內肉爛空外皮浮軟上下有孔流膿中間薄皮搭住如橋使毒護塞不能儘性摻藥難以完功用剪刀將浮皮剪開自可任意上藥易於收口升藥所忌手背乃三陽經脈之部生瘡忌用升藥助火蝕肌宜清火燥濕藥摻之膝蓋下至足背生瘡皆濕熱下注居多尤忌用升藥閉濕生火須以利水清火藥外摻背部濕痰塊背為陽部又督脈循行之道人身氣為陽而血為陰若陽衰而陰偏盛脈絡因之不暢每入飲食所化精微不歸正化而變為痰留滯經絡走注於背致漫腫隱痛最難消散體壯者潰膿雖遲猶可收功體弱者十中難保二三痔漏大腸盡處為肛門肺與大腸相表裡氣主於肺蓋勞碌忍飢或負重遠行及病後辛苦太早皆傷元氣氣傷則濕聚濕聚則生熱熱性上炎濕邪下注滲入大腸而成漏時流膿水由咳嗽延為漏者難治體實者與其刀割掛線不若內服消漏丸方見後久久自效臁瘡兩脛內外廉骨每有脾虛濕盛化熱蘊於血分而成臁瘡初發紅片破流臭水極其延綿難效或有氣虛下陷而患口難斂者但壯實婦女患此而瘡口常血出不止者由天癸將臨經血錯行不循正軌尤不易效宜內投涼血清熱之劑春夏時陽氣升泄治多費手交秋冬後人身肌膚固密始易為力外摻用黃靈丹勝濕丹方載青囊集雞胸症腎主骨肺主氣先天屬腎腎虛必盜肺氣肺損不能下蔭子母交戕故病後失調或咳久傷氣使胸前忽生高骨漸凸成患者男婦容或有之惟小兒稟質不足得此者居多初起外在骨尖處灸之切忌針刺內服補肺養陰湯方見後龜背症父母之體素虧所生之嬰孩先天早為不足若襁褓中失宜或多病致傷或早令強坐則脆嫩筋骨易於戕損使背中脊骨痿突初發如梅漸高似李甚則傴僂亦有風水所召者極其難效每見男女由腎虛腰痛而得者惟久服益陰煎方見後保其天年從未見有全愈者虛人有病易昏憒虛人氣血必是兩虧若遇外感之邪乘空橫擾正氣不能抵禦任邪鴟張直犯胞絡神智為之不明語言錯亂起臥無以自主須於本症方中略加扶正之品即黨參玉竹之類始得載邪以出不然正虛邪陷未免奄奄之慮胖人同法病挾氣鬱宜審善怒多思之體情志每不暢遂怒則氣結於肝思則氣並於脾一染雜症則氣之升降失度必加嘔惡胸痞脅脹煩冤在本病應用之藥量意加入舒氣解鬱幾味如佩蘭佛手鬱金沉香木香香附之類徒以見病治病不求其本焉能有效治少壯婦女病要法女子以肝為先天肝藏血少壯時經水適來適去忽然生病其邪必陷入血室血屬陰搏結邪氣莫出身體必重令人昏昏默默不知所苦延久不退當於所用方內加以嚮導之品如桃仁胡索歸尾之類破其血壘搗其巢穴不難迎刃而解孕婦忌用防其傷胎老姬天癸已涸可置勿論治孕婦病法孕婦若有病所懷腹內之胎早具人性故一人生殃兩人有慮一人服藥兩人消受醫藥之所繫也大矣哉稍有不慎一犯胎元易使隕落傷及二命欲得兩可之道在臨症時應用方藥常宜加安胎數味於內如當歸白芍枳殼蘇梗有熱加黃芩有寒加肉桂胸悶加川朴木香腹脹加大腹皮體虛加白朮無不應手奏效其餘參病酌用自可保全母子兩安時疫捷法先看兩肩有紅點天地間每有厲氣流行觸人鼻竅肺主鼻由肺傳胃先犯上焦氣分起初惡寒隨後發熱舌苔白滑渴不欲飲獨右寸關脈洪數邪熱上熏則嘔熱勢下注則瀉蓋肺司皮毛脾主肌肉熱邪漸次傳裡蘊而日熾爍營耗液逼邪達表皮膚現出如蚊齧紅細點為疹隱於肌肉紅點為斑赤亮者吉紫黑者凶常發於春夏秋三時冬令間或有之初宜用豆豉荊芥桑葉殭蠶西河柳鬱金桔梗蟬蛻升麻之類升透其邪兩三帖後當清其營以柴胡連翹紫草地骨皮丹皮象貝山梔赤芍兩三帖後倘壯熱大渴喜飲舌苔燥裂急救其陰投犀角地黃湯白虎湯或荸薺汁甘蔗汁枇杷果梨汁如是渴未能解乃少少飲以冷水入腹後不作嘔任其飲足隨出汗而解亦有邪隨汗出惡寒戰栗而解者退病早者一候外七日來復之謂也有延至二候三候始退者不可不知産後治法大略産後百脈皆空不宜發表並大寒大熱之劑傷敗氣血再虛其虛雖有他症皆以調血為主若惡露未盡腹痛者以當歸炭五靈脂桃仁泥炮姜血虛暈脫者以當歸炭白芍炭杞子川斷阿膠珠淡蓯蓉丹參香附太子參茺蔚子有風者加荊芥炭桔梗川芎有寒者加肉桂發熱口渴舌燥者加黃芩麥冬丹皮不思食者加石斛穀芽炒苡仁凡有雜症臨時斟酌參以婦科書諸法始無差誤矣溫病舌驗溫邪方發兩三日舌便燥裂而縮言語呢喃神識半明半昧飲不解渴或渴不欲飲即投育陰清熱之藥病勢全然不退此腎氣將絶水枯無以上潮心陽散越不斂難過一候之期溫邪一見舌燥大渴引飲皆知進清熱養陰法煩渴雖暫解移時仍渴舌雖回潤隨復燥裂止壯熱不見汗出脈象躁疾不靜此生化之源已竭不能引邪外出百無一生溫病初起舌苔白滑如粉至六七日雖煩躁神昏渴不思飲而舌苔不見乾燥此邪直犯心胞不幹陽明之腑十中難救一二惟以參麥散方見後以希萬一初病舌遂黃白相兼而滑或止黃而不燥或邊白中黃或中白邊黃皆不乾裂此乃脾濕與穢濁上蒙胞絡其人多時明時昏渴不多飲多凶少吉溫邪至五六日舌苔見灰白而潤或灰黑夾黃而不燥神志模糊此腎氣敗絶上凌心君水極似火之象非津液枯耗無以上濡若用苦寒濟陰是促其危勉與炙甘草湯方見後聊盡人事而已病至數日舌苔乍黃乍灰黑為值邪盛之時舌又忽轉白潤乃值邪退之頃一日迭變此由正氣本虛邪來與之交戰故舌亦現幻象人事皆沉不醒雖煩不渴姑以輔正清邪一法以俟天命何如有種時邪並病久之人神氣清爽尚能起動口又不作渴舌苔忽現嫩黃光潤色此胃氣欲絶以胃屬中央黃乃土之正色中氣外泄真色不能內藏不出四五日當死診婦人宜先問凡診有夫之婦病脈先詢其經水何時宜行何時而止若逐月應期者不關經水與妊娠之事倘經已停兩三月非天癸有故即恐懷孕之兆用藥中須加和營順胎之味始不與理相悖忌大熱破血桃仁附子之類傷胎損命病退緩進飲食病將退去胸中多嘈雜難安乃胃經浮火沖激欲得食物來填始快但病中消耗臟腑脂膏腸胃必為枯細務忍餓一日周十二時待胃氣漸回若遽與之食恐脾土虛不克磨化則無形餘邪必藉有形穀氣為依附遂搏結不散而微焰又能復熾壯熱神昏治實難於初病每致深陷不救仲景謂之食復症主以枳殼梔子湯方見後再加消滯清熱藥俟四五日方漸退亦有延遷不起者凡既餓一日先須進米飲二三日再食稀粥可也楊梅瘡發源天地之道陽施陰受男女起興皆憑相火而發凡一婦女交合男子過多其所受精氣邪火蘊釀為毒伏於衝任二脈腎開竅於二陰肝主疏泄相火內寄於肝人身氣血流貫百骸若交媾時便攝一身之血至命門化精而出所以骨節舒張心神坦蕩元氣從茲暗耗嗜欲則精竭精竭則氣餒氣餒則神衰往往成癆成痿在婦人是肝腎久受之毒倘男子與此等婦女歡接則邪毒必乘泄精後氣血虛時而內襲此為欲染者先從下部生小紅疙瘩或大如梅或隨腐臭或筋骨痠痛或小便淋澀周身皆能患生一時難效久服仙遺糧散可愈方見後若聞生梅毒者氣味或食穢物而發者此為氣化易治濕溫辨每年交夏至後天上之暑熱流動地中之濕氣蒸騰人處天地間適受交迫之鬱氣先侵肺胃初病頭覺裹痛身困重而板疼惡寒午後微熱胸悶不作渴舌苔白滑面色淡黃脈濡而弦甚則昏沉懶語蓋濕邪損人陽氣肺賴胃土以生氣主於肺胃母肺子肺傷則氣難化子病傳母胃損則津不布故神倦煩冤以三白湯方見後開通肺氣則濕自化也醫者每難捉摸為何病若認暑熱使其輾轉沉綿有日矣老人病治法人至年老未有氣血不虧者一染外感則邪熱蒸迫使陽益衰而陰益涸舌苔雖潤則臟腑已燔炙難支初宜用輕揚之品以疏表如桔梗杏仁鬱金牛子荊芥桑葉葛根豆豉過虛者量意稍加黨參若猛浪投麻黃白芷羌活防風桂枝細辛獨活辛竄燥烈藥再伐其生氣縱表邪一時暫退有旋變煩亂喘促暈脫者司命者可不慎歟診外感起初法凡有外感諸症入手總宜宣達肌表之藥使邪有路而出若不詳審便與苦寒湯劑則經絡日阻邪氣愈為局錮無由外透病之輕者轉重重者轉危但寒涼藥用於邪已化熱舌現乾裂渴欲涼飲脈象洪數斯時為救液靈丹猶旱魃之遇甘霖也至有喜以熱藥當先者每遇病者不究其何因輒以熟識幾味暖性填寫紙上其人果是寒邪原合病勢出乎偶爾幸中不足為功若療溫症何異抱薪救火更劫其陰旋變狂躁喘急之患若極虛人生病不受重劑克伐須於疏散方中微加黨參輔助正氣托邪易出不可拘執初病無補法試觀貧乏之輩非濟以資財烏能支持家道乎若夾食滯之病非添消導藥不效總之首貴辨症辨症既明投方無誤辨症不明舉手便錯誤人匪輕矣耳痔腎與三焦濕火上騰使耳中氣脈阻閉或先干癢有日繼而焮疼異常初生小紅肉逐漸塞滿竅內甚至拖出耳外時流臭血水名曰耳痔正如濕地熱蒸而生菌也宜針刺出汙血水搽硇砂散方見後內服龍膽瀉肝湯方見後鼻痔鼻為肺竅天氣通於肺經以膽移熱於腦則辛額鼻淵乃外由風寒侵入腦戶蘊久化熱生痔不聞香臭甚而外掛先以針刺破隨將棉花蘸硇砂散塞鼻中五日一次漸化為水而消此如爐火上炎而成煤也內服羚羊角散方見後防面赤腫起火走串若鼻流清涕為腦寒治宜溫散但生半鼻者可治倘由鼻淵而成者難消盡矣虛火鼻衄虧弱之體太歷辛苦或病後未曾復元氣血不充肺主氣脾統血肺虛氣不外護脾虛血失中守若陰絡一傷逼血上溢清道而出以補肺益脾飲方見後二帖自已蝦蟆瘟時行厲氣遏於膽胃二經致耳下浮腫不堅或由左串右或由右串左外宜貼清涼膏藥內進普濟消毒飲方見後若化熱成膿按癰疽治法倘誤用火針必赤腫可畏若耳根痰腫至數日後多堅大不能左右相串痹症痹者閉也風寒濕外受則經絡閉塞四末失其滋養手足麻木緩縱周身痠痛有因勞傷筋骨而成者有因坐臥濕地者有因浸入涼水者有因衝犯雨雪者皆宜針灸多次內常服祛風濕活血脈藥酒痛處常貼膏藥遷連之病亦有治之不應成廢疾者痹脈沉緩或澀先宜辨明似痹非痹營分不足無以榮筋筋急作痛者有肌表不密外風內乘久郁化熱耗營燥絡使筋脈枯澀周身軟弱串疼無休者脈數而弦以養陰潤燥湯方見後緩治自效陰斑陽斑宜辨陰寒內伏逼其浮火外散舌潤脈沉遲而虛發斑如蚊咬痕當服理中湯方見後若夫時邪所發為陽初時寒熱或脈靜身涼或又嘔惡煩亂渴不喜飲頭疼有汗是邪陷胃腑而逼營分熱蒸液耗而然治法見前設早誤苦寒藥使營氣冰凝則斑內隱神昏譫語恐無救法寒濕腫腿奔走熱足驟入冷水浸洗或在水中勞作凡人動則毛孔開寒濕之氣內襲致脈絡阻滯氣機為之不運難以蒸變陰液為血所聚隧道者皆水肌肉呆板腫亮日大不得汗泄初時艾針刺灸佐進藥酒或可退細延久成患足解顱先天不足之嬰孩若吮乳汁不為肌膚則精氣無以上充髓海肢體消瘦惟頭顱日見胖大亮白令人可駭有發此症未日久而殤者亦有延數年者治之徒費手無功昔見鹽商之子用真人參研末做棉帽冬夏久戴長成者只可廣人之見聞天下能有幾巨富者其力皆可購參乎況真者覓於何處乎他孩用之果能皆效乎瘰癧瘰為小者癧為大者症原與治法前賢論之極詳究難遍試大都多由肝經忿鬱胃腑痰瘀經絡不暢則痰隨氣上升至頸蓋氣也痰也皆能蘊而為熱也氣遇痰則凝痰有熱則腫結久不散乃成推之動者烙以火針及已潰爛者俱常貼五苔頭草膏方見青囊集一膏貼十日內服清肝化痰丸方見後非治數月不痊推之不動並串至胸脅者難治有食鼠食剩物與虛體勞傷而生者拔膿管式說其管以薄銅卷如象筋粗式長二寸余要中空似細竹緊焊其縫一頭銼平一頭銼斜尖式用時要尖頭插患孔內少頃則膿自管中射出如箭鵝口瘡脾胃鬱熱上蒸口舌白腐疊如雪片在小兒名鵝口瘡先以牛桔湯方見後升發其火若苦寒藥用早則冰伏火勢有喉爛氣喘聲嗄之危虛火牙疳病後陰陽兩虛中焦浮火上炎致牙根腐臭當六味加肉桂湯方見後引火下降非比實火可用苦寒以制其勢痞塊治分虛實腹脅內之痞塊初生如梅漸大如杯堅脹作痛乃病後脾虛一食雞肉葷腥麵食糯米不能磨化停於臟腑之外軀殼之內加以血脈日裹膠錮難散體壯者可針灸數次投消堅散方見後緩緩消去如虛體食少者誤針必轉中滿不治腿脛濕熱大凡膝蓋以下乃濕聚之地濕盛生熱熱結腐肌癢痛交作血水雜流治不易效直如卑窪之處日照難乾以推行散方見後清血熱利濕邪發物忌食一切發物為外症尤當戒誤犯者隨加焮腫潰痛斂者復爛醫者須囑咐病家宜先若小兒痘後犯之肢體骨節隱痛漫腫卻如注痰延綿難效有發症隨死者有成殘疾者即如牛羊肉魚蟹蝦蚌雞鴨海味豬首王瓜芥菜芹菜茄子番瓜扁豆甜菜菠菜芋頭芫萎菌子香菌金針赤豆竹筍豆腐麵食豆粉麵筋鴨蛋烏豇豆各味病後口瘡小兒病久肺胃大虛無根之火上浮滿口生瘡爛腐面黃身腫或腫如饅口流涎者可治無涎者難治以六味湯加肉桂方見後婦人腹痛宜辨婦女有滿腹串痛者有痛在一處不移者有寒留胃脘作痛者宜溫散中焦有蟲擾腹痛者宜安其蛔有肝氣閉塞痛者宜平肝和胃有氣裹水腹中漉漉有聲而痛者宜導吐痰涎或行針灸有血瘀氣滯腹內生癖痛者宜理氣逐瘀加以針灸數次有胃汁枯槁痛者宜甘潤胃陰有中氣虛損不運而痛者宜補中氣有臟氣欲絶痛無止時服藥不應者不治注痰塊寒濕與痰液阻滯經絡隨處可注為痰塊先在腫硬處宜細火針烙之宣通其氣即消去者有消此處而串彼處者有針孔略流清水仍腫者內進陽和湯方見後若患上焮紅此由濕火所聚外宜敷清涼藥內以清利法不可行火針此症輕者一二月重者半載一年有潰後難斂成廢疾者有此症並搭背因腫痛傷胃致氣血虛不能鼓動肌肉托毒外出忽軟陷不痛亦少膿血當溫補扶助正氣服藥後不高起化膿與不生肌者難治有誤進苦寒敗胃陽而成者急宜溫中醒胃有一日發注痰十數塊或發二十餘塊亦有數日內發二十多處若是者乃氣虛不能運血流貫經絡故隨注隨腫甚至不知疼如針刺及投藥不應者不治有因注痰服瀉痰物致虛者宜服溫脾湯方見後有壯實之體生痰塊初以芫花末三錢整大棗三枚去核為丸服下瀉稀痰而消者有此症潰膿日久脾胃已敗極難收功今定藥粉方方見後補中開胃則內肉漸生而斂徐徐而效有小兒頸項生注痰若串至喉立死若一日渾身發一二十塊者不治有小兒身有隱痛未能自言其故延至月久忽見膿潰終難完口惟久服八仙粉方見後可效倘入冷水則三陰經即受濕氣一犯房欲則腎精耗而肌肉腫在舊患上即作痛潰膿水雖治寡效每因此成勞而死者有虛體欲後易受風寒壅於隧道初知隱痛漸腫成注痰治難速效似注痰非注痰體虛者若過於勞苦傷損氣脈則經絡因之不和周身每有浮腫不痛不可針刺更傷血脈內進調補藥外敷溫和之品緩治方得成功大麻風認法麻風初起處必麻木不仁毛孔閉而無汗有紅暈碎塊稍腫如雲片者有皮白生屑如癬者有用針刺出黑血者大麻風針法先在好肉與病肉分界處用墨筆畫一隔界圈凡患處或分圈或合圈皆圈定次在圈中次第點成黑點每點相離些許後以九個二號針各眼穿線卷圓外包布條扎緊須露針尖在外每黑點刺三十六下隔界圈亦刺三十六下即用麝香冰片牛黃各數分研末入薑汁米醋內和勻磨墨塗刺過黑點上再在黑界圈上刺三遍亦隨塗藥水一次未愈仍照前法刺圈內未刺之處若足痹腫須砭去汙水盡而止若已破皮淌血水者不治既刺忌鹽醬一百二十日方不復發久旱疫久旱不雨則亢厲之氣流行天地間在夏月尤甚河井之水亦被燥熱蒸耗人處斯際內受水泉之毒外迫炎熯之邪易生時疫互相傳染更有勞傷之輩元氣早虛加以飢餓剝其臟腑境況擾其情懷其陰分未有不先虧者初病疏散方中稍加潤藥以卻亢勢繼以甘寒大養陰液若莽投溫散劫陰致變舌乾口渴譫語神昏狂躁不安恐為不救抑知熱邪先干肺胃肺金忌燥胃土喜潤病由陽邪治以陰潤陽原足以傷陰陰亦可以制陽陽衰則熱去熱去則陰生於是亢陽得與柔陰相為濟美則太和之氣鼓舞身中而病倏然遠退矣久雨疫雨降連綿久鮮日照則陰霾之邪迷漫宇宙地中濕氣上騰人身之陽易伏而陰獨盛凡見邪熱化斑病始終總宜輕散雖延有日壯熱煩悶舌不燥口不渴似化熱未傷陰乃陰滯於內而格陽於外故熱止發於皮膚不曾傷及胃腑惟有透陽以和陰不當助陰以困陽若與涼劑即神昏亂語煩躁不休矣且雨澤多淫濕生寒每傷脾土則中氣不運常見瘧痢痹痛霍亂等症用藥喜溫忌涼喉痧論喉繫於肺肺開竅於鼻則鼻外通天氣一觸非時厲氣由肺傳胃先見鼻塞咳嗽惡寒發熱遂喉腫痛腐其病似喉風傳染他人甚則耳下漫腫或腫串左右牙關緊脹痰壅氣急或身發紅斑腫處宜貼清散膏藥治法見青囊集下手誤進苦寒藥冰伏風熱隨轉沿爛聲啞嗆咳大人費手小兒不救療瘡食葷味散黃疔症初起一疙瘩如粟米覺麻木癢痛誤食葷腥即助火生痰閉毒不出愈加腫硬作疼是為走黃有毒走串他處發如注痰者誤刺火針成不治輕者可治毒重者不救俟至十日外膿熟痛減無妨並搭背對口一切火毒致病皆忌葷腥伏毒梅瘡有男女染毒知欲發瘡畏恥不言只求速效每有用輕粉一錢或升藥一錢加大棗肉數枚為丸分數次令病人服下者則患者口舌破腐咽喉腫痛難進湯水時吐唾涎十數日喉口方松毒收入骨如油和麵瘡雖暫愈後或數月或隔幾年毒又外透隨處生核或小或大皮色如常隱痛漸破黑爛極臭豎頭壞肉深嵌在上部用升藥生石膏黃連大黃研細末摻之貼膏藥漸愈如落膝蓋下暫痊必屢發多服敗毒方可知輕粉升藥皆水銀煉成性烈助火入胃灼陰殆盡醫者臨此症詢其生梅毒否服截毒丸否方有把握至此遂遺毒於後嗣苦邪淫濕火不由下泄每炎炎上爍肺系喉中腫痛並無寒熱可進飲食倘喉風發寒熱難進飲食爛形似蜂窠或有臭味或腫爛及帝丁甚而爛脫漸串至鼻或有鼻爛脫盡串至唇口面目爛者或有毒攻腦戶爛延頭額此名開天窗者或有滿舌臭爛如蜂窠此名舌疳者或止鼻孔腫痛生小紅瘡此為鼻疳者或先由鼻串爛唇口漸爛通喉者或止喉爛為喉疳者吹以青霜散加升藥擂勻方見青囊集外摻遇仙丹見青囊集外貼膏藥常服仙遺糧散以降其毒方見後或止由上唇外邊先爛腐後便豁嘴串鼻者不治梅毒乳癰婦女梅毒犯於陽明致乳房爛深似陷全不腫痛時流臭清水乳汁常通以此可辨梅毒臁瘡梅毒下注三陰腿脛爛黑或紫暗色時淌臭水中有豎頭肉凸凹如嵌珍珠形大小不定名落底結毒極難全效野楊梅兵興日久之處必有惡厲氣橫亙其間兼有馬溺流入河井虛體及勞傷人易受其毒入於肺胃淫於肌肉達於皮膚先發小紅疙瘩漸如梅李臭爛翻花內有豎頭肉為野楊梅者不由精氣傳染而來治法同梅瘡易效下疳玉莖有爛至逐段脫去平根者外搽珠黃散內服敗毒方漸可收功若腫硬臭爛治之不應者難廖若腫似豬肝色者不治霍亂時邪宜辨霍亂頭額與周身全不發熱只有頭眩煩悶上吐下瀉者若不吐瀉惟腹痛甚為攪腸痧果時感頭面身腹總髮熱醫者須用右手按摸病人頭與胸腹方知若婦女令彼自家內眷按摸可也用降藥條宜審癰疽潰膿日久患口時淌稀膿或流清水終難完口或完口未久又發必膿毒瘀結成管用降藥條插患口中貼膏藥過七日管自出再上收口藥可愈夫降藥用水銀降成其性與砒霜相等猛烈爛痛不可輕用少壯者可少用若幼孩老人及虛體者用之生變但痛甚則浮火上攻口舌與牙根糜爛者用生麥益陰煎方見後凡口中眼邊耳中鼻內並心窩腰眼玉莖紅筋聚處血瘤氣瘤總不可用關人性命從來只知其利未知其害今有一變險為平法用降藥三分生石膏七分糯米飯汁搗和作條亦能追拔惡腐收口內宜投調養方若外症潰膿旬余用白降條極易全功不可用三品一條槍害人三品一條槍者用砒霜經火鍛鍊加糯米飯汁和成細條其性悍烈熱極誤用則爛肉斷筋腫痛難忍每有爛通經脈血出不止害人者獨外科正宗載此方可速刪去幸諸醫籍未選入耳㿹皮瘡起初皮膚紅亮焮痛隨見細黃水泡沿散渾身名㿹皮瘡誤用水洗即串爛不救惟用黃柏大黃生石膏青黛芙蓉葉研末白蜜米醋和敷過二日一換遂愈治外吹乳法乳孩隨母身邊夜臥鼻孔之氣易使吹入乳房則乳內竅孔壅閉乳汁不通腫硬作痛一乳形有七瓤後多串腫潰膿延綿凡乳有病其汁多苦孩不肯吮須倩大人吮五六日乳汁一通方可收口冬溫辨冬令本寒而反溫和則陽氣不藏使人腠理疏縱易傳為病有汗不惡風乍發熱乍不發熱咳則引胸隱痛有一候即解者有二三候方解者治法同時疫夏日傷風辨初起惡風發寒發熱頭痛有汗欲衣被覆蓋身體困束不渴嘔惡煩悶脈浮洪不似暑症壯熱口渴汗多只可輕涼方即桔梗白菊葛根枇杷葉薄荷杏仁以逐其風不可過涼過暖之弊致變先審病人稟性用藥人體質有虛實之分稟性有寒熱之異屬寒體者病時宜用涼藥中微加溫和之品以監之若太苦寒敗胃有致吐瀉胃寒腹痛之患屬熱體者病時宜用熱藥者惟溫平品以緩治若太燥烈恐激起本原之火致煩渴狂暴失血之患屬實體者或因病變虛宜用補帖些少與之若太呆補致不食腹脹中滿逆氣之患屬虛體者病時宜克伐尤宜性緩品若太峻厲致虛脫多汗肢冷懶言煩躁欲入水之患痧痘後與病後宜戒口味痧痘後與病後氣血皆虛則肌膚薄嫩若犯一切動風鮮味發物葷腥助火生風或轉走馬牙疳或風疹癢瘡或外癰遺毒每有愈後值其痧痘所發節氣復發凡乳孩須乳母戒口為要小兒疊發風疹小兒乃脆嫩弱質淫風厲氣每能侵犯而發風疹壯熱咳嗽鼻塞作嘔眼如含淚煩躁易啼身現似針尖紅點此名風疹非痧也治法同痧有一月發兩次者有連接發三四次者病孩與乳母皆宜戒發物爛皮野痘夏秋間濕熱蒸爍浸淫人之肌表發膿窠瘡皮薄起殼頂空漿清形似痘粒易破流水但水淋處爛如剝鱔一用水洗則串爛難圖他人黏近其瘡亦焮腫爛皮治同㿹皮瘡虛火牙衄病後中虛使脾不統血無根之火逼血上湧牙縫而出脈虛弦用六味湯加肉桂三分方見後因口不臭為別引火下降誤與苦寒制火反大涌出不治若胃經實火口臭脈數有力宜投犀角地黃湯毒藥不可入口腹凡單方毒藥非常用之品誤入腹不救即如斑蝥番木鱉砒霜煅雄黃馬蝗水銀硇砂河豚巴豆輕粉莽草鴉片此類尚多審病用藥不拘日期有種外感初被涼藥冰伏邪氣不出使人煩悶嘔吐胸痞多汗壯熱渴喜熱飲舌面雖黃舌底潮潤小便黃赤皆邪內擾而然不問一候外或已二三候仍宜用輕揚品升托其邪如桔梗葛根升麻桑葉蘇梗香附一二帖自愈煉白降丹法水銀明礬食鹽皂礬火硝各一兩研末用大銷銀罐在火爐上慢慢少許挑藥入罐內攪不停手漸漸結堅直至藥硬面起黃色此為結胎火候已到其法極難看老嫩得宜在此一刻間如過嫩過老覆罐煉時皆落下無用速𫼘離火爐次用比銀罐稍大小瓦盆一個將罐口對覆盆內再以皮紙浸鹽水封罐口四面然後以砂灰護圍罐半截隨安放平地即在盆周圍以板磚圍與盆平遂用火炭放罐底逐漸放周圍先文火後武火煉至三炷線香時待冷開罐刮下盆底藥片用清水漂淨曬乾研末要冷天煮糯米飯搗熔和藥做條粗如線香長一二寸聽用煉時須靜室忌人出入看外症內陷法癰疽至氣血兩敗不能托毒外泄化腐生肌則毒內陷患處肉爛如棉軟低凹流汙水不與四面之肉相黏或紫黑如炭全無活色或爛肉棉軟難脫或腐脫淨不生鮮紅如石榴子肉或爛如深洞只流血水臭味如尸或膿如豆腐腦傾入水中有油花泛泛或紫如豬肝色皆正氣內敗惟補托一法以盡人力結喉疽結喉骨生疽極難潰膿或腫硬不通氣不進湯水者危或潰後不得斂口成漏者瘌痢頭皮虛血熱風濕內蘊上攻於頭風盛則癢濕熱重則靨厚屑多有傳染而成者須戒發物時用湯洗每早用麻油搽患上每晚以生薑片擦之麻油潤皮膚生薑開毛孔務一二月勿間斷無不愈病中大便下黑血病中肝脾兩敗肝不藏血脾不統血正氣下陷故下黑血或下大黑血塊為壞血皆不治戲藥是病久胃虛易生變幻雖醫藥頻更始則中焦猶暫受繼則氣力莫能當無非盡其人事耳有病日久初服此醫之方一二帖頗效再服則不效又延彼醫不問藥對症與不對症初服一二帖亦效再服又不效及屢更數十醫皆如此為戲藥終不治經絡滯痛似痹凡肌枯肉瘦則氣不能行血血不能輔氣經絡阻礙周身痠痛串走似痹或漫腫如注痰針之無膿血消之不退飲食日減精神日敗多見不治針後勞動病轉重內外諸症經針灸後即勞動傷筋脈若外症則僵腫不消毒氣四散又難化膿外敷散藥內進和營活絡方非一兩月不得愈骨槽癰風熱上壅陽明致耳下漫腫牙關脹痛為骨槽癰以針刺牙根盡處出血即松內服清散方若牙關緊閉滴水不入名骨槽風若牙痛見牙根腫凸一點即是牙疔疥瘡結毒成臁疥瘡濕毒下注腿脛外結黃靨內淌脂水照濕熱臁治法破皮瘡病久脾虛濕邪浸淫肌肉周身皆可破皮流水色黑形陷不肯生肌是土氣已敗遷綿難愈辛香氣味宜避辛香氣味性最溫竄透入鼻竅內達臟腑元氣暗被銷耗令人不覺每見成癆凡佩香袋香珠及焚闢穢諸香皆宜棄去惟阿魏能制香氣因此致虛者多服補劑為佳治疤孔法先用針刺破其處蓋人面部疤孔乃為破相流年值此部位蹭蹬用陳降丹生石膏乳細摻疤孔內須薄貼膏藥過七日疤孔肉果俱腐起太深者只薄摻生肌散一次貼膏藥後多貼無藥膏藥疤孔淺者不可上藥只貼膏藥倘疤孔內未腐仍薄摻降藥貼膏藥待疤肉見腐要貼膏藥四十日自長平復或先貼膏藥五日使疤肉回嫩易腐千古妙方鐵針入肉鐵戳入肉不見取癩蝦蟆眼珠四個搗敷戳口三日針現頭可鉗出冷天在河內取蝦蟆或戳口上降丹貼膏藥過一月針自原口吐出或大吸鐵石吸之亦出骨傷斷人過四五十歲若手足骨跌斷骨中精髓已堅滿一時難接或須經年方可復原年少骨中空薄月餘可歸舊鴉啖瘡初起紅腫隨轉紫黑沿爛深嵌時流脂水似鴉喙所啄形故名鴉啖瘡周身可生乃脾肺濕熱過盛溢於經隧所致摻藥方見青囊集經水倒行婦女若臨經期下竅阻閉反見血從口鼻湧行此氣旺血熱引之逆出上竅惟降氣涼血自循常道歸經囊癰自爛卵落可治濕盛熱熾者每下注腎囊失於療治則易腫易潰常有爛穿囊皮脫去一卵者或落下兩子者無容驚畏只內進清熱利濕方外摻兩元散方見青囊集貼以膏藥一二月可全功若刀棍傷落者立死肢肉傷治不可遲人之肢體肌肉及手足指設被刀斧傷落不在斃命之處尚有皮連或皮已斷先宜止其血速趁血未冷氣未散安整原位不可稍有歪斜即在傷口摻生肌藥外貼膏藥加以布條扎緊不使移動隔三四日一換月餘可痊尚傷落之肢肉一過遲而血枯氣散雖如法安放上藥必難接續歸原因生氣已去豈有復長之理至接斷骨妙在手法當考傷科書自知咯血圓點不治吐血雖多由肺胃肝來者十中可治七八惟咯血乃痰帶血絲蓋由咳久肺傷或脾虛無以生肺或風遏化火刑金初時易治延綿多費手最危者痰見圓紅珠形神飲食尚未大敗實腎水將枯龍火震動營分溢於上竅以圓為天天一生水腎者水臟水中火爍越位侵肺故咯圓點血星十症十死抓碰成惡瘡人有頭面肢體每因抓碰傷破肌肉或被刀斧傷斫初無關礙乃不戒葷腥發物致患處焮赤腫痛轉成疔瘡惡毒病者與醫家昧於不知其由宜速忌口味依外症施治延遲難救氣虛成瘤每有病後體虧氣虛不能上升使頭巔之氣機不運凝腫如瘤按之綿軟或大如杯或小如桃不可動刀針只宜峻補正氣月餘自消又有初生小兒先天不足亦有此瘤不必施治兩月後自愈病時病後要省勞節欲人當病來一觸忿怒勞動並嗜欲憂思能使輕症轉重而重症入危至病將愈尤宜屏去外緣方易強健若不禁戒變象蜂起誰之咎歟病中轉病有因內病將愈隨轉外症者亦有先由外症欲痊旋起內病者更有輕病變重而重時又轉輕迭相循環者又見病日未久傳變不定而病象無常者皆由臟腑早敗精血散離不能斂束而神氣無所依據現出幻端其亡可立而待也砒霜切不可用入藥砒霜本大熱大毒禁用之品一入藥中進腹則腸胃炸裂立時見斃若以搽頭蝨則頭面赤腫裂痛用擦疥癩則渾身肉腫皮綻或腐肌剝膚輕則使人殘疾重則殞命中其毒者內多服清敗藥外以生軍緑豆粉青黛黃連為末老桐油和敷人忽反常人有素性好靜少怒忽變為多怒而常動此陰已虧而陽將亢有性嗜動善怒忽轉成寡怒而求靜此陽不足而陰有餘凡七情之喜懼愛憎逮乎居室衣服飲食玩好皆與平昔迥乎相反者殆非禍兆即是病機他人只可迎其意而婉然勸解勿可再拂其性而使更劇也
