body:
  text: 卷下醫案一人背脊正中長三寸寬一寸癢不可忍每日必搔刮皮破血流始快名百腳風醫以桐油和石灰捶熔做如患上一樣長寬當中做一空槽式將有底一面放患上次以煎滾香油傾入空槽內熨之熨至痛不可忍方止三次愈一少婦寒邪與痰濕留於三陰經使腹疼不止頻進溫通理氣藥不應改用吳萸肉桂乾薑木香烏藥陳皮研末溫陳酒下三錢立愈一少婦每懷孕至三月則墜三月心脈養胎心屬火主血胎藉血養木火之體又值火臟胎脈兩火交併灼血耗液胎元枯澀內臟難系故墮猶乎瓜繫於藤藤枯瓜落以清營順胎方超墮期前一月隔兩三日服一帖服過五月七月期方止蓋胎皆隕於單月單為陽屬火也若虛體胎隕者宜補氣血生地當歸白芍熾殼黃芩麥冬梔子元參知母川柏或加川連一嫗小便點滴難下痛如刀刺小腹墜脹乃龍雷之火與濕熱結於小腸宜瀉肝熱利濕邪十數帖全好龍膽草胡黃連蘆薈滑石梔子丹皮片芩苦參澤瀉通草瞿麥車前子引琥珀屑一老人濕熱蘊於大腸日久化生寸白蟲奇癢不堪以驅蟲法清早服四帖除根使君子蕪荑雷丸楝子槐角貫眾鶴蝨川柏烏梅引黃土一兩一老人形容瘦小偶診其脈全無自云生來無脈一世未嘗有病此天下所罕見者志之以廣醫林耳目一新一嫗素常失血忽因勞力吐血盈盆諸治不效後以降氣化瘀方立止此氣鬱化火逼血妄行耳蘇子歸尾鬱金旋覆花青皮絡香附三七荊芥炭玄胡索橘絡降香末引佛手玻珀藕節一人哮病冒風寒而發或勞力而發者宜小青龍湯麻黃桂枝蘇子細辛白芍杏仁桔便乾薑一童過食鹹成哮者或過食甜亦成哮以緩劫法輕粉八分研末白麵八兩和作燒餅八個分八清早食之小兒減半一人體虛勞動而哮作脈細弱以宣肺扶土方即平杏仁南沙參玉竹太子參茯苓蘇子橘紅半夏引冰糖一婦有梅瘡毒發時筋骨痠痛渾身生出紅疙瘩隨潰膿水屢發屢愈奈毒根太深不得全好一人手腕生三堅硬核大如棋子由惱怒傷肝氣分鬱結痰凝絡脈所致烙以燔針出黃膠水此為痰瘤插入降條提出堅核大凡瘤皮有紅絲纏繞即是血瘤若用刀針則血流不止而死若按瘤棉軟或大或小乃是氣瘤誤用刀針真氣立散而危有種筋瘤其筋似蚯蚓蟠結形不禁刀針易使筋縮難伸惟骨瘤肉瘤初起可用火針插進降條化盡其根可愈至已腫大如桃李決不可動刀針害人一老人背疽漫腫瘡頭無數分清雖出膿水但年老氣血虛非補托不可進十全大補十帖根腳消而瘡反高起用刀剪開流去膿血調治八旬始痊凡老人背疽雖愈不出三五年多死一老人生陰搭背僵硬如盤痛不可耐先搗蒜頭鋪患上加艾絨灸之使溫通血脈轉為陽內服陽八味加黃耆黨參扶助正氣三日後烙以火針隨插藥捻又三日硬悉化腐漸脫百日外始完口一人夏月足底生疔誤食豬肉立刻走黃毒散由腿至肋數處腫如注痰塊大小不等痛不可忍照疔治法一日疼止切不可作痰塊治用火針立危待膿熟放以刀約月餘方痊一女孩生下無肛門先用藥線穿掛肛上羃皮四日吊豁隨以披刀挑破肛之正門外用細木尖長寸許裹以薄棉插入刀口三日使皮肉不得復連乃成完全人矣一孩生下舌下中筋與下牙床相連不能掉動用剪刀剪至舌下正筋處而止以藥止其血即愈一少年夏日常赤身將背坐倚有石之牆圖其清涼適意豈知陰冷凝澀經脈未幾覺背痠痛日劇一日療治不效延半載乃逝一童周身生骨瘤堅硬貼骨小大不一肌肉日瘦由母腎虛與骨月至戚苟合胎感其氣而成久服腎氣湯自消熟地菟絲子萸肉破故紙杞子當歸昆布海帶淮牛膝乳香覆盆子陳皮一婦氣鬱不舒使左乳結核三枚如棋大方一月下以火針隨插降條隔六日一次數次化盡核而止此症宜早治若大如桃李或潰血水及翻花皆不可治一人膝蓋漫腫痛不可當飲食不入外搗敷社花根紮好兩日一換內投溫經燥濕藥一月全功一老嫗腿生痰塊初覺隱痛二旬外高腫疼甚腿胖如屍形容日瘦烙以火針全不知痛乃脾敗肉死尋亡一少年面浮黃神氣弱背中並乳旁有痰塊漫腫光亮脹痛之極針出黃水此脾虛濕泛至兩月將斂口忽渾身浮腫瘡口迸裂已而遂殂一人病後浮火熏肺致音啞難言投六味湯尋愈一婦耳下始隱痛漸腫大經治後腫雖退而牙關仍緊延已兩月頤下有一孔流膿是骨槽風之膿毒結成多骨抵拒牙關用刀刺牙床後盡處插入降丹少許閉口半日勿食免藥毒入喉傷人提出多骨乃痊一嫗牙關不能開牙床一深孔流臭水飲食不入終為不治之症一婦產後血虛生風身癢搔起白屑發落目瞀與祛風潤燥涼血丸半年病如失一人肚臍腫爛時流黃水乃腸胃濕熱從臍而出內進清利濕熱藥外摻黃提丹漸腫消水乾而愈一婦面黃瘦每見生米口即流涎得啖始快此脾虛濕盛化熱生蟲與烏梅楝子鶴蝨貫仲槐角雷丸蕪荑川連檳榔花椒以黃土煎湯煨藥十劑後無恙一女瘦弱不堪常食臭抹布及臭汙泥此腹內有蟲窠與殺蟲藥十數帖除根一人病後遺毒牙關脹硬牙齦臭爛時流赤黑水不進飲食投藥不應而亡一人起居如常時喜吃金鐵土石物毫無所礙此肝胃火旺極生蟲故能磨比堅剛之物以大青葉煎飲二旬專清肝火乃愈一人因數日夜賭博大輸致相火上沸擾亂心宮將舌齧去一截尚不自知遂投降火安心藥而痊一人自六歲生痰塊背上至臀破潰十八處時出黃水不絕延及三十歲未愈形色雖敗飲食尚可大約是起初多進涼藥冰凝肌肉所以治亦無效一孀婦心懷不遂鬱火上蒸使舌根生數孔時出臭味謂之嗪舌治數年總無功一人牙關初腫閉他醫令其食葷腥發物則風熱被葷味助火滯毒腫硬愈甚牙關永緊只進稀粥成骨槽風錮疾終身不治一人手中指生疔食豬肉飲酒走黃毒重腫痛已三年不稍退先令飲洋參桂圓湯一碗固其元氣隨以快刀將患指根節筍處剁去刀口摻止血藥即浸手冷水內後乃提盡餘毒一月全功一人緣動怒使肺氣阻閉湯水難入初作喉風治不應余以舒肝理氣藥蘇梗佩蘭枳殼沉香玫瑰花鬱金香附木香佛手四帖遂平一人被火藥將頭面並兩手轟燒皮膚欲腐兼起水泡隨用生軍末調老桐油敷外貼皮紙過二日一換一月全愈一人休息痢二十餘年先投培補正氣藥六劑繼進大承氣三帖攻其老積遂下血團一個此積滯為血所搏藏於大腸隱曲處每有觸動則發屢發屢止後調補月餘乃痊一孩環跳穴生疽因多服涼藥致肌肉冰凝成漏時消清膿一足已跛終成不治一婦內踝骨生疽形如剝鱔腐流臭水人身濕多下注摻勝濕丹須外紮緊則藥方不從水淌去後遂獲痊一人生左足發背爛開臭腐極痛足背至下之處難於升發收口甚遲摻勝濕丹紮緊隔四日一次五旬奏功一婦手足遍生紫疙瘩焮疼或潰黃水名紫癜風乃濕熱留於血分而然以刀砭去毒血外將老桐油調清涼散敷之內進涼血摻濕藥隨手取效一孩上牙床縫中常流臭膿此為牙漏用銀條探試奈其漏上通於鼻無法可施矣一人內目眥成漏以探條試之通外先插陳降條化去管次將利剪豁開上生肌藥貼膏藥一月完全若通眼內決不可治一婦口角生疔誤食豬肉走黃唇腫翻硬刀刺無血極痛煩燥嘔惡此毒內閉又串至脅肋漫腫三處如流注若用火針立死內服疔毒復生湯方載外科正宗十二劑唇上膿潰腫退但脅肋至月餘始有膿百日乃完口一人患縮腳痰已好誤食赤豆使毒復萌患腿痠痛難忍僵硬如鐵療治不靈延年許聊可伸動卒成跛躄一人患流注三處臥床一月未見膿獨尾閭穴已深爛是名席瘡乃肌肉先死辭不可治尋亡一老人冬溫發熱煩躁有汗大便泄舌板硬燥裂全不渴飲脈象細弱陽病陰脈此真陰告匱不得上潤立見神昏勉投救陰法不應而逝一婦對口腐已脫盡瘡中黑凹腥臭不肯生肌此為內陷壞症竟死無救一婦素忤逆一日罵姑不堪忽被雷神提至空中陡然摔下嚇得心神恍惚如醉如癡與柏子仁遠志當歸熟棗仁茯神丹參麥冬夜合花九節菖蒲龍齒金針菜六帖而安一人手碗生肉瘤大如杏經針後隨耘田傷及筋脈一手漫腫作疼連破數孔出膿仍不消腫治有二年方腫退口斂手指終拘攣凡針灸後一犯勞動必見腫痛一老人患陰搭背腫硬如盤皮色不變先搗蒜頭鋪瘡上再加艾灸如此兩次根腳雖收小正頭堅黑刀刺嗝叭有聲此肌肉僵死如石冤譴之症更數醫終死一婦冬月冒雪遠行又赤足涉水過渡使陰寒之邪內逼隨髮直中傷寒身冷頭髮熱而痛無汗周體青紫六脈沉伏辭不立方三日乃殂一兵剿寇凱旋因心喜急奔路五十里俾五內之火沸湧上騰逼傷陰絡之血妄行由口眼耳鼻而出奄奄一息猶出不止與犀角地黃湯甫入腹血即止此方治實火不可治虛火調息數日而康一婦大瘧數年脾胃虛極中氣不運周身浮腫食入作脹與補中消滿法雖暫效已而腫甚於前乃土敗不勝藥力後延半載沒世一婦乳房臭爛中有豎頭紫肉並不腫硬乳汁又通此楊梅遺毒照梅瘡治法乃愈一孩痧疹熱盛熏爛肺葉每張口有臭蛋氣觸人治亦無效若大人口有臭蛋氣之病未有生者一婦產後風邪乘入太陽上踞清道頭疼如破或作或止延及廿年針灸頭維二穴四次內服當歸川芍黃耆白芍黨參羌活冬朮細辛防風白芷十二帖除根一婦生反唇疔因食勞葷走黃滿頭赤腫毒延至背潰流膿水從二月療已近愈至五月仍然昏卒一人秋邪三日忽昏厥如屍胸次尚溫脈且流利細詢因素嗜洋菸斷煙數日值癮到時無煙殺癮正氣又被邪氣暗耗所以難支先用煙膏二釐衝開水灌下接過其癮旋投祛邪輔正方而愈一人患秋燥誤服燥藥三帖致陰傷液涸遂神昏舌短不得出言先進梨汁潤其臟腑尋投清燥養陰湯五日遂瘳一人脘痛不止形脫食少已延一年乃寒邪蒙閉中焦氣機呆滯難運與黨參官桂丁香烏藥木香草果吳萸陳皮附子烏梅三十帖疼減其半又三十帖覺心中嘈雜更以枳殼半夏砂仁茯苓白朮黨參陳皮山藥甘草木香八帖病如失一婦遍身痠痛手腕高腫數塊如棉肢痿食少乃脾虛血弱經脈流行不暢風襲筋急謂之痛痹用當歸冬朮白芍山藥黃耆桂枝木瓜靈仙秦艽防風貝母川斷四十帖腫疼減半又四十帖而平一人脘痛左乳下漉漉有聲如囊裹漿脈象滑數此痰蓄中胃挾肝火上犯先以瓜蒂散五分開水調下立吐痰水兩碗繼投楝子吳萸半夏木香薑汁炒川連茯苓乾薑烏梅陳皮白芥子二十劑全可一人冬月常五更沖寒遠行則寒氣阻閉經絡手足多生青紫塊麻痹難動議桂附理中湯加溫通藥八帖乃痊一老嫗體虛痰盛忽昏厥聲如拽鋸稱為痰中投三生飲加味黨參冬朮橘紅薑汁附子南星木香竹瀝沖灌頃刻神稍清脈總弦急延八日竟死一人因服硃砂青鹽神呆語澀面赤口渴起坐不安此苦燥烈性擾犯心神陰傷火熾無制投大劑白虎湯加犀角八帖遂平一人見食碗至前嗅鼻發驚狀此瘋犬毒內伏詢其被瘋犬咬否彼云曾有瘋犬咬傷並未發作咬口已平囑其速辦後事入夜果亡一人腹脹如鼓月餘只飲稀糜先以舟車丸三錢開水下移時瀉濕水積滯半桶腹脹便消後進枳殼麥芽冬朮神麯山楂陳皮苡米調理一月復元一老人春溫二日便神昏譫語時輕時重脈十動一止或廿動一止諸醫皆辭不治此年老正虛不能與邪相抵至一候七日也邪退正回自好一人因傷食起病脈七動一止在法無治至八日發出斑疹而愈此風熱早伏藉傷食更閉難於外達故昏沉懶言至一候經絡已周而症乃現一老嫗常頭痛引腦鼻淌臭涕此膽熱移於腦煎灼陰液滲泄而下名為鼻淵當清熱透腦法與辛夷羚羊角藿香蒼耳子知母梔子生石膏川芎生地黃芩豬膽汁八帖病除一人上下牙床隱痛腐爛脈象遲細此陰虛浮火上炎以熟地澤瀉茯苓肉桂丹皮山藥萸肉八帖即痊第虛火如雨中雷電之火見日則消六味中加肉桂引火歸原乃雨中電火而見日光矣倘用苦寒陰霾反盛更益其病一人牙縫忽生肉條挺出口外名為髓溢先以鐵烙燒熱烙平內進生地蓯蓉骨碎補菟絲子阿膠萸肉杜仲線魚膠淮牛膝龜膠豬脊髓十二帖不發一人舌腫硬難言脹疼不入湯水即紫舌脹舌中乃凸起一點以刀刺出血投三黃湯三帖遂消一婦大瘧延至體虧在法當補以六君湯入腹便昏暈詢其素不受絲毫補益反與克削藥始蘇此稟賦之異者一婦每生病六脈全無迨疾退脈亦漸起向來孱弱不能載邪故脈沉伏不現惟見病治病不必憑脈可也一婦季夏在田中農作值烈日蒸起埡糞濕邪兩足侵染其毒遂赤腫作腐痛癢難當常欲以手摩擦致手亦染其毒乃用手持物吃則毒徑犯喉系隨時咳喘甘蔗蒜頭煎飲可效但糞毒咳失治無救一孕婦因濕熱上衝頭疼欲死先刺風池兩穴太陽兩穴痛稍減脈來洪數與膽草澤瀉夏枯草白菊滑石山梔桑葉羚羊片黃芩知母四帖後不復發一孕婦六月受暑發痧誤飲生薑湯遂腹疼不止凡痧忌姜暑天尤宜戒用白王瓜皮煎飲再刺痧症諸穴立定痛而瘳一老人病久陰傷相火震動無制玉莖破皮流血痛甚外搽珍珠散進生地元參川柏生首烏山梔丹皮知母龜板女貞子麥句廿帖漸斂口矣一婦腹痛引陰不止凡溫通理氣去瘀殺蟲及平肝針灸諸法均不應乃臟結症數日溘逝一嫗臍腹咬痛便泄晝夜無度諸治罔驗亦臟結症故疼常無休息旬日遂亡一老婦左臀被針戮旋腫疼似流注日夜呼號眾醫束手延月餘方死此傷人神何者謂人神人身氣血會聚之源也一農夫每勞動便胃脘板痛得食稍定此中虛因勞而氣難運故疼投黨參白朮陳皮木香草蔻黃耆山藥肉桂乾薑吳萸六帖痛止驟難除根一人慾後髓空陽虛便入水捕魚陰寒乘間直入三陰周身掣痛竟無定時因經絡悉為寒邪阻閉不通六脈沉伏與四逆湯加桂枝當歸不應三日遂卒一婦生顴疔散黃面腫如斗作痛昏瞀症勢瀕危以疔毒復生湯不應乃加琥珀一錢疼止腫漸退一人右顴腫硬皮色如故旬余未化膿此風熱上壅其名顴瘍最屬遷綿以牛子薄荷山梔連翹殭蠶丹皮桔梗黃芩外敷清涼散漸退一人口生紫泡牙床臭爛手足發紅暈斑壯熱煩躁與薄荷山梔羚羊角麥冬知母生石膏片芩三帖全退一婦生外踝疽淌膿五年不斂因骨筍空隙處為之穿潰常一細孔流水不能入藥終成痼疾不治一童跌豁上唇嘴摻生肌散用棉帶紮緊拴於耳後四日一換只進稀粥不可言笑靜養一月平復一人忽喉痛不腫痛牽耳下難忍惡寒壯熱滴水難入從午初至申刻便死此風邪閉滿肺絡脈來促急乃緊喉風也一人喉不腫痛忽痰壅不出氣塞難通湯藥滴不能進內經謂一陰一陽結為喉痹延三日乃死一婦腿內側生流注治不得法年餘始潰每出膿盈碗已六載未收口乃骨縫空隙已被爛通藥不能到肌肉為之空浮稍勞動即胖腫諸治無效一嫗生數處流注烙以火針毫不知痛此肌肉早死遂辭不治二日後果死一人年幼腿生流注療十數載方愈及壯夏月入水陰濕又乘三陰初覺舊患處隱痛兩月後只潰清水因肌肉久虛故無厚膿與生耆白朮芡實蓮子山藥黨參附子合炒老黃秈米磨屑加紅糖調食接補正氣四月餘雖痊旋又完姻精氣更加暗耗復因入水舊患仍作諸治不驗而逝凡久病體虧戒欲為要一人曾染妓毒幾年後因有病正虛淫毒乘間竊發龜頭生如翻花菌大小十數枚逐一用藥線扣住過一日收緊線一次待落下隨上生肌散而痊一婦大瘧延久形瘦脾虛過於作勞忽口鼻俱出血不止乃脾虛不能統血上溢清道而出以黃耆白朮玉竹黨參山藥當歸茯神牛膝二帖便止或因此發牙衄者治方同一女頭頂被碰跌由頭至額腫軟如棉此氣凝血瘀所致用活絡膏藥貼自消一孩跌破眼睫流血當時未洗淨遂上下睫長為連合尚有一孔通光用刀割開眼縫隨止其血目可照舊惜目珠閉合年餘生翳難除一女孩額上跌破初起失治數月來滿面皆膿串空起殼汙水不斷逐漸插降條化毒並生肌散而痊一嫗鼻中生痔挺出不通先刺破受藥力次以棉花蘸硇砂散塞之復加棉花塞緊難落隔五日一次化盡服生地丹皮知母梔子元參花粉條芩川連則面方不起火一老人表虛血弱筋失營養常覺左腳底有氣一條串至胸肋脹悶欲絕移時串上頭頂又從頭頂走至右邊胸肋亦復脹悶移時串至右腳底氣止人安每日數次不堪其苦先以腎氣湯加理氣藥卅帖再用當歸杜仲黨參黃耆杞子菟絲子巴戟天白芍淮牛膝海桐皮川斷葡萄肉破故紙毛脊五加皮陳酒隔水煮一支香服四月悉平一人生搭背常要刀剮去患上肉方快隨出蜈蚣數條直至剮盡背肉出蜈蚣無數乃死其人作孽太重冤仇相報耳一人左肋生流注未完口因遠行跌倒碰傷患口竟出血不止乃遠奔則浮火必騰使經脈錯亂逼血而出投犀角地黃湯入腹即止一婦中虛痰盛使痰隨經絡流串遍身或凝結多處腫軟如瘤按之不疼癱弱不得轉動者年餘用川貝母四兩陳酒六斤隔水煮服漸能行走矣人身多痰氣血盛則痰化為血氣血衰則血化為痰也一童勞苦傷中脾氣鬱結化熱生痰凝於舌下左邊成為痰包腫脹致言語飲食俱難以刀放出膠痰杯許插陳降條少微化去根方不復腫一嫗玉戶腫痛不得大小便飲食不入此濕熱注於膀胱移於小腸將成蚌疽投龍膽湯加利濕藥三帖潰流紫血盈盆外摻清涼散又前方五帖全愈一嫗刀傷破左食指皮自摻藥剛收口忽一手腫痛不止飲食欲絕或而昏憒脈象疾硬治不應手此傷人神者四日故亡一人食牛肉便腹脹壯熱以山楂建曲青皮檳檳厚朴麥芽枳殼蒼朮加稻草為引因牛喜食草物理當然覆杯則消一童食蛋停滯致心窩腫凸如李食少形削將近十載用手提起腫塊使離內膜免傷胞絡以針輕緩刺下灸之服化積方十日針一次一月除根一婦心窩生疽月餘不潰僵臥食少用細火針輕緩眠側刺少許方不傷內膜插入藥捻拔盡膿乃愈直刺針必險一嫗生喉蛾膿出甚多遂太勞動大損肺氣忽音啞無言別無所苦早服燕窩湯接補晚投益土生金方旬余言能高朗矣一人霍亂三日仍吐瀉使中氣敗竭而陰陽已倒行逆施則大便自口而出此胃底已翻四肢厥冷煩躁不安至七日而亡一產婦血虛風燥周身串痛幾處浮腫如桃筋漸短縮難動脈來浮數以生地鉤藤阿膠白芍大胡麻丹皮當歸沙苑首烏女貞子生龜板絲瓜絡十帖復原一人針戳手掌肉內用細繩紮緊手腕使不上走針隨血脈走至心則死未嘗剮割一月針從原口而出一人喉生疊肉狀似雞冠攪塞要路惟進米飲症名喉岩以火烙烙平服解鬱方乃消三月後翻腫勝昔難語難食時流鮮血知是冤報未久遂卒一婦傷子過悲致肝脾氣鬱智慧不靈神昏不語不食不大小便直臥如屍已旬半惟目尚靈脈遲細以鬱金佩蘭木香佛手蘇梗夜合花茯神九節菖蒲橘紅遠志沉香煅磁石香附解鬱安神通竅八帖遂起坐如常一嫗肝鬱喉間梗阻湯飲可進硬食難入帝丁左右有筋扛起撐脹不爽即是上格用刀刺筋上多不出血服平肝理氣方數次便松一老人搭背潰後見代脈此膿腐去多元氣不相接續之故與十全大補十日外脈如常瘡口已斂忽雙足痿軟不能動仍進大補法二旬如舊一人滿頸起痰核十數枚先烙火針疏通其結進柴胡貝母蔞仁海藻海浮石荸薺香附橘紅昆布丹皮海蜇頭十帖外全消一婦乳癰已痊因勞動便焮腫流膿將逾二載投八珍湯卅帖乃不復發一人慾後下床小便寒邪乘虛侵入腎經玉莖腫亮不痛與杞子巴戟天韭子菟絲子蓯蓉熟地覆盆子山萸破故紙鹿膠六帖腫退一婦臨產去血過多忽然昏暈肢冷脈絕立時不及備醋炭與火盆先以火紙卷粗卷點火藉煙燻鼻接透陽氣立醒內進調理方獲痊一人滿腿腫亮作痛乃脾虛濕邪溢於肌表其名冬瓜痰用針刺出黃水敷沖和膏而愈若用火針便爛難斂一人大腿生流注三月餘方潰膿競諸治法不得完功因人腿只一條大骨名成骨另有兩條脆骨名輔骨夾扶大骨於肉中今被膿爛穿骨縫空隙藥不能入常流膿水終身一婦天寒臨產兒先出一手經一晝夜不下用艾葉一斤煎湯傾盆中令產婦坐盆上四圍密護莫走氣俾熱氣熏透玉門交骨得暖方開兒遂奔生而下一人肝鬱化火上升頭巔火滯血瘀結成肉條長及三寸紅亮豎凸觸之痛極用青黛川蜜和敷月餘全消一女喉外結核脹疼治已將痊繼音啞難言以蘇子叭杏苡米蘿菔子象貝桔梗蔞仁紫菀炙杷葉十二帖聲漸透如初一人玉莖浮腫破爛流膿延有半載以生地胡黃連川柏銀花車前子知母土茯苓梔子澤瀉甘草梢十二帖外搽珍珠散皮斂腫未消並不疼袖住馬口如嬰孩自言如此腫已十年故難消一童痢下日久痢雖止而脾胃敗極忽右手癱軟難動與當歸熟地黨參白朮白芍山藥杞子黃耆茯苓紅花廿帖復原一孩腸澼延久穀食甚少正氣耗傷致目眶內陷日珠生膜投熟地萸肉太子參冬朮菟絲子杞子山藥淮牛膝當歸陳皮調治一月膜消復明一幼女左肋生肝癰潰破兩月餘失治穿透內膜患口如蟹作沫每摻藥隨被膜內氣煽去無存必死之症數日而夭一人牙根作痛漸爛穿牙床日見深嵌延開及腮仍痛不休此為牙岩禁用刀刺辭不可治延年餘死一人龜頭腫痛色如煙煤馬口閉塞爛至尿管溺從爛孔流出臭不可近此肝腎濕毒結久所致治之不應而亡一婦生鎖口疔走黃滿面紅腫四日漸消以刀刺疔頭流汙水不知痛其毒忽走至手臂及臀腫如流注忌用火針並暖藥煩亂昏憒三日乃殂一孩日暮內喉脹痛急進疏散方不應至平旦氣促神呆而殤此風熱內閉是緊喉風也一婦因寒凝氣滯腹痛以溫通理氣方六帖不效次用吳萸肉桂木香附子陳皮研末溫陳酒沖服痛立止蓋末藥尚存原性故治速效不似煎劑性已淡故鮮效一人項下漫腫氣喘吐涎湯水難入是風痰內閉服藥無功三日便卒一婦小產去血太多血虛液涸火灼臟燥擾動心神悲喜不知自主似神鬼所憑數伸欠者以甘麥大棗湯當歸阿膠紅花丹參柏子仁大棗二枚甘草白芍杞子小麥二合入腹即平一女少腹隱痛不能仰臥小便下膿血乃小腸癰以歸尾苡米澤蘭沒藥玄胡索桃仁蔞仁乳香木通車前子十二帖全安一嫗臀生流注不甚高腫而疼引及半身不納飲食不過六日乃亡一老人由牙床爛穿過腮深陷可畏並無膿水亦無臭味其名牙岩諸醫推辭年餘方死一婦胃痛廿餘年右乳下硬如覆杯漉漉聲響此痰積於軀殼內臟腑外空處先以瓜蒂散五分湧吐其痰服黨參乾薑半夏烏藥吳萸木香白芥子橘紅草蔻白朮官桂十二帖除根一童跌豁上口唇先以細火針穿通兩邊豁唇次以絲線針自火針孔穿出收緊豁口摻生肌散貼以膏藥三日一換惟飲稀粥禁止言笑一月復原一人龜頭忽生皮包住只一線之孔通馬口小便極難用細鵝毛管寸許插入孔內後漸換粗毛管插之外以布袋套住玉莖欲溺去之溺過仍然包插久久其孔可寬小便自暢一孩瘧久轉痢瀉如莧菜汁此脾虛不能統血陽虧不能蒸血變赤服藥不效四日而殤一婦腹疼月餘轉成腹脹氣促痰鳴湯藥入口即吐用銅鐵鑰匙廿四把煎飲至夜半瀉水甚多脹消能納飲食一婦生鎖口疔食葷走黃唇硬如石面腫如斗刀刺不疼口中氣臭神昏譫語湯水難進不肯化膿此毒內閉十四朝而死一童因驚恐每夜夢一紅衣人與黑衣人相鬥至天明方退延及三月夫黑色屬腎紅色屬心心火獨亢腎水不充水不制火心腎不交而然投生水安神方熟地柏子仁茯神白芍龍齒石菖蒲丹參夜合花遠志棗仁金箔金針二帖不復見一婦產後少腹板痛小便難出是氣血壅閉與寒邪交結成小腸癰若大便結乃大腸癰延已三月仍痛甚難轉動只進米飲肚臍腫突出膿摻提膿丹針灸少腹數次以歸尾桃仁沒藥蔞仁五靈脂木香澤蘭乳香苡米香附玄胡索肉桂十帖後漸起床矣一人舌左畔生兩個硬尖叉不便伸縮言語漸至爛穿半舌不得納食名為舌岩因心緒太煩水虧火旺所致無何便亡一人玉莖赤腫尖頭爛若蜂窠時流膿血後中段又破一孔出膿溺從此孔而出馬口堵塞色似豬肝此血肉早死延半載方死一老人滿舌腫脹作疼不能進食名盤舌癰勢甚危殆先用通關散嗅鼻開通其氣凡喉舌病皆可用嗅鼻法舌本立松吐痰甚多次以刀刺舌下出血進清火化痰方尋愈一孀婦乳房腫硬如石此體虛氣鬱而得貼消堅膏藥服佩蘭當歸象貝黃耆鬱金茯神香附青皮黨參白朮遠志陳皮一月全消一婦善怒悶氣痹於上焦致呃逆之聲達於戶外作呃忒治不效以杏仁蘇梗沉香鬱金枇杷葉桔梗紫菀佛手佩蘭降香症乃肺痹十帖漸好或加金沸草丁香代赭石柿蒂經治數人皆效一婦常腹疼串至滿腹聲如雷鳴嘔惡不食臥床難起以黑醜枳殼建油白芥子桃仁黨參沉香玄胡索煎汁送滾痰丸三錢下痰水甚多或舟車丸三錢或三聖散防風瓜蒂各三兩黍蘆一兩為末齏汁下一錢皆能逐痰一童右手痠痛用冷水浸漬以希定疼豈知血脈被冷水冰澀已死隨現紫黑斑片漸加竄爛筋肉腐落後至指肘爛脫形削不食而死一婦往田刈麥刀傷左脛皮約寸許彼時未嘗介意三日後一足赤腫如屍連腹皮有紫黑起泡破流黃水壯熱神昏譫語不食痛難轉動此因刀染蛇毒皮肉一近毒從血脈走串一日便卒一婦傷子過悲舌尖生一紅菌其大如豆蒂小痛極妨礙飲食名曰舌菌先以藥線扣住線頭將膏藥貼藏於面便於進食漸收線緊七日菌枯而落次以火烙燙平菌根乃愈一婦往園圃摘取王瓜滿手旋串爛及腕臂時流脂水療及半年始痊此手沾蛇蟲之毒也一人右足背有蚊一齧便腫連膝脛麻木不疼敷清涼散加雄黃服敗毒藥六帖而消此蚊先吸蛇蟲毒血故移毒於人一婦產後暴怒震動肝火耗竭陰血血舍空虛神志瞢亂言語顛倒不識親疏飲食如常投當歸丹參蓯蓉白芍杞子玉竹佩蘭遠志萸肉紅棗鬱金香附阿膠八帖霍然一婦秋邪月餘昏沉不言不食臥不能動大便久結胸次灼熱惟目珠尚靈正虛邪氣里結以大承氣加高麗參三錢扶正通便服藥半日大便行神漸醒隨進米飲接補元氣漸痊一婦時邪六旬昏睡不語不食大小便利不渴微熱詢其經水適來發病經即停此熱入血室形容枯弱目珠靈活以生地丹皮山梔片芩柴胡桃仁赤芍元參三帖病退一人溫邪六日無汗壯熱大小便通大渴煩躁臥轉不休舌苔白滑帶黃脈象洪數此邪熱內陷與井水一杯甫入腹大汗淋漓熱退人安無病矣一嫗哮症數十年冒風寒則發喘促不得臥湯水不入語言難出神昏舌強奄奄待斃以蘇子附子乾薑肉桂茯苓杏仁橘紅白芥子三帖乃平一人秋邪八日發熱形脫無汗臥不能動舌白潤脈細數已穿齊衣服待氣下入櫬先與梨汁半杯入腹後煩躁大作略與涼水飲下更渴一日夜計食梨卅斤井水一大桶遂溱溱大汗病如失此症罕有遇之者一人冬月賭博數夜忽神昏跌倒不省人事目閉不言便泄無度脈象沉微與桂枝厚朴藿香砂仁蒼朮附子陳皮木香三帖遂起一婦因夫歐後腹疼十日未止遂服鴉片自盡當遭救醒腹疼更甚連進跌打理氣方不效加紫棉秸二兩入原方中煎服立愈一人咯痰帶血三年來左脅板痛漸串至胸腹脹形紫瘦不食痛處喜風吹之方快爽若是無風即用扇自扇百治不靈死時十指捲起兩足蜷縮一人用人言搽入發中蝨俾頭面與身赤腫裂痛皮膚乾燥敷清涼散服清火敗毒方三日消去一人小便六日不通用桃枝柳枝槐枝水蔥煎滾傾桶內患者坐桶上四圍密護熏蒸一時竅開溺如注一人用人言水銀搽疥瘡致周身皮燥開拆白屑脫落不絕以當歸杏仁生地桃仁火麻仁柏子仁丹皮阿膠紫草山梔郁李仁麥冬廿帖稍好原方為丸收功一人體胖勞動太過胖者多虛忽手足疲軟不能舉動故勞則氣傷氣傷難以運血血滯不得貫通脈絡當補氣和血方黨參當歸白朮川斷五加皮黃耆紅花玉竹白芍陳皮六帖行動便能若作痹症用散藥則癱矣一婦產方八日其夫即與交合遂嘔惡頭重癱軟畏動懶言服當歸炭太子參蓯蓉菟絲子冬朮炒丹參炒白芍杞子阿膠珠乾薑山藥陳皮八帖安然此傷衝任為重補奇經所以效一婦因夫時熱症初退與之接合隨發熱不安腹痛難忍名陰陽易投鬱金香附小樸公鼠糞十四粒枳殼殭蠶藿梗韭根五錢二劑乃效一人稍勞動便肛脫寸許坐臥不安此體胖氣虛下陷使然進益氣湯加槐米地榆另以獨活當歸側柏葉烏梅倍子青蔥煎滾傾桶內坐上熏之數次乃收上一婦陡然渾身麻木手足抽搐神困不言似肝風非肝風也是胖人多虛加以產多血耗乃氣不行血血不榮筋耳投歸脾湯六帖而退一妊婦時疫告危先只用門面藥不效余進生地枳殼山梔片芩麥冬蘇梗連翹花粉當歸元參二帖因加順胎藥故神驗一婦懷孕已六月乃感時疫壯熱胸悶腹墜口出臭氣知胎已死用蒼朮陳皮厚朴甘草加芒硝三錢夜半果下一死胎熱亦退調治而痊一婦妊足十月口鼻皆血出三日未止氣微神憊難動湯飲入口則嘔進順胎涼血方生地蘇梗麥冬小樸沉香白芍枳殼知母山梔元參三時許隕下死孩便安一老人年近九旬生中搭手赤腫作疼二候尚僵黑未化膿以八珍湯加附子五分四帖扶正助陽痛止得膿腐亦漸脫繼以六君調治全功一人右乳下生流注堅腫作痛不食神敗身不能轉二旬外口中吐膿數碗此必膜內之膿後腫處亦出膿此必膜外之膿延至半年收口蓋未穿破內膜故而得痊稀有之症也一人左耳下發馬刀癧大如杯狀焮硬痛甚加之染患時疫晝夜昏躁不安忽口鼻俱淌膿數碗此馬刀膿從內潰而來翌日而斃一人休息痢延半載轉為每日瀉綠水四次食少軀削此痢久脾虛肝木來侮夫木色綠木強陽弱失其蒸騰之力故而腸泄以破故紙冬朮蓯蓉菟絲子黃耆續斷巴戟天山藥杞子淮牛膝黨參萸肉加生薑紅棗卅劑而止一老人左耳下生馬刀癧漫腫如李不覺焮疼此由肝氣與痰凝滯而成若用針刺立疼痛速死以逍遙散後誤於刀刺便脹痛而死一人目珠與面身純黃色食少倦怠脈遲細此陰濕發黃疸以茵陳苡米澤瀉附子赤苓蒼朮肉桂五劑而退一人突受大驚精神恍惚目珠與身面皆黃脈虛促此膽因驚而裂膽汁流於經絡運及一身之故無法可治已而乃逝一人兩眼及身面都黃色不時煩躁能食脈數此濕熱盦伏成為陽黃進茵陳梔子木通車前子滑石澤瀉萹蓄川黃柏四帖色皆轉白一孩患瘧誤服截散藥多劑使元氣損敗面色晃白汗出不止神脫難言肢冷脈絕目珠獨靈先以高麗參二錢煎米飲灌之接續陽氣隨進補益方而愈
