body:
  text: 卷中鼻淵腦戶久為濕熱上蒸外被風寒裹束鼻通於腦氣亦壅塞時有腥膿滲下如釜底常有薪炊則釜中自生變味氣水涓涓而滴名曰鼻淵乃肺腦實火以清肺飲方見後引加豬膽汁一個沖服膽可通腦以有情入無情轉能制病十數服自效下疳宜食淡味患下疳與鼓脹病皆忌鹽醬因鹹味斂濕助火凝痰使外症腫痛腐爛然食淡味人易衰軟以秋石充鹽為食最妥肺熱極便爛臭表邪遏伏於肺失於宣散並嗜菸酒火毒上熏久鬱熱熾爍腐肺葉則出穢氣如臭蛋逼人雖延遷終不治膿氣味如臭蛋癰疽成膿日久未經開放愈釀則熱愈盛熱愈盛則蒸灼腐肉變味愈熱愈熟必穿決而膿出其氣臭過於臭蛋在四肢總拖連難斂在身體者難治腎氣遊風脾腎兩虛氣血錯亂濕邪內擾每臨暑濕之令外濕激動內濕使足脛皮膚紅腫墜痛為腎氣遊風用針刺出濕水將黃柏末豆腐和敷內服防己湯方見後赤白遊風表虛風入兼血熱皮燥致皮癢搔落白屑或生水窠或有黃白靨遊走不定赤者名赤遊風白者名白遊風治不易效久進祛風丸可退方見後狗咬毒易走散常犬咬破皮肉即上戌毒丹貼膏藥方見青囊集四五日可愈倘不速治及不戒口其毒易散紅腫焮痛爛深淌膿在上身者按癰腫治法在膝蓋下者先提毒三日再按臁瘡治法若瘋犬咬者治法見青囊集辨痧疹腹痛小兒痧疹熱毒未達伏於腸胃常悠悠腹痛頭與胸腹皆發熱或全下發熱其身腹有紅紫塊點或隱或現脈浮數宜疏散其表如誤以暖藥入腹不救若蛔犯中胃作痛痛有止息尺脈沉滑忽大忽小若寒邪腹痛脈沉遲此二症皆不發熱頭面頸項外症不可針灸頭面頸項生瘍乃風熱上壅居多頭又諸陽所會誤用針灸似救火沃油遂漫腫難挽至肉桂麝香溫暖膏藥尤不可貼亦助火為腫可畏粗筋多處忌針勞苦之輩腿足多有粗筋盤曲則筋內即血管或濕氣盛與血分過熱者雖發外瘍誤用刀針恐血淌不止無救外症忌食燕窩燕窩是海燕銜小魚黏於石上而成藉燕口含之元氣清補肺陰乃海味發物若外症誤食補塞毛孔毒遂內陷不出串腫潰爛不可收拾也濕腳氣又名腎臟風肺司皮毛脾主肌肉二臟虛損濕邪留連化熱下注熱甚則皮赤而發熱濕甚則腫胖而惡寒多在盛夏陽氣發揚濕暑流布生於虛體安逸之輩而足脛先腫而後痛是血傷氣名濕腳氣或先足彎一點紅腫或自足指與足脛先起而後串腫一腿或串及兩腿脛者七日可退若腳氣上衝乃水來凌火則嘔吐不止喘急不休者逆也以當歸拈痛湯方見後乾腳氣足脛不腫而痛蜷縮枯細乃熱甚傷血為乾腳氣宜涼血清燥湯方見後外瘍腐肉脫時凶象外症脫腐之時膿血去多正氣難支患底肉如灰色全無生氣或患上驟變乾枯無膿四邊皮色焮紅起暈鎖住患口或針刺刀割並不知痛口渴唇燥心神慌張形色呆板脈象弦硬皆胃氣敗絕血枯肉死無根浮火外泄陰陽兩離殆四五日之命腰痛日久成龜背痰脾腎兩虧加之勞力過度損傷筋骨使腰胯隱痛惡寒發熱食少形瘦背脊骨中凸腫如梅初不在意漸至背傴頸縮蓋腎衰則骨痿脾損則肉削其龜背痰已成愈者甚寡縱保得命遂為廢人宜久服補腎湯方見後吸洋菸人病難復元吸鴉片者氣血日被煙火熏耗腎水漸枯脾陽不振所以食少肉削皮焦神憊遇病即昏迨病已退多軟弱難起色要靜心培養倘性躁欲速痊恐有不能脅肋生核肝氣鬱結並虛體勞苦太過者脅肋生核遇勞動腫硬尤甚或潰流清水堅腫依然若此未有不成癆者痔瘡濕熱下注大腸從肛門先發小疙瘩漸大潰膿內通大腸日久難斂或愈月餘又潰每見由此成癆者乘初起服清熱內消散方見後數帖可愈若無咳嗽而成漏者不治孕婦病須保胎孕婦病忌熱藥須應用方中入清熱順胎步步保護若熱甚陰傷胎已墜下多分不救血瘀格食噎格日久格拒飲食不納則胃之上口或有瘀血攔截滴水不進或吐紫血塊二三口者或吐鮮血杯許立刻亡者或數日後方死者或延弱極而死者上格憂悶傷肝致帝丁兩旁凸起紫筋數條束緊咽喉似物撐塞吐不出咽不下名為上格用長披刀刺斷其筋內投平肝散方後見自松再動肝氣必發糞毒致病田圃種植必以糞為滋培每交三夏烈日炎威所照蒸起地中濕毒則農作之男婦手足易染其毒始癢痛赤腫隨串爛用蒜頭青松果甘蔗萵苣皮煎洗數次可愈倘以染毒手指拈食物入口則毒易染物犯肺必發喘咳治不能效濕水歸腎囊脾虛不能制水則水下聚於腎溢於子囊腫大亮如水晶將細鐵針眼穿頭髮一根在囊總筋兩邊順下流勢處各穿通發一針將針過孔口各留髮兩段在外拖掛使針孔不閉則水自易流盡內宜服溫補利水方眼腫難睜眼目腫閉熱毒內灼生翳爛珠用竹片二條長與眼齊寬二分許先以綿線紮緊竹片一頭即將竹片夾住眼上胞內眥又以長線紮緊竹片外端留線拴於耳上則眼可睜以泄火氣腫痛可退數日後所夾之肉腐脫無妨取牙宜慎牙齒痛久其根雖極動搖內有血筋綰束若草率動手取落傷動血筋則血湧出不止有性命之憂投犀角地黃湯方見後如不止者加西洋參二錢多骨症骨槽風與牙疔初起食葷腥必助火閉毒堅腫串潰連及面頸牙關緊閉最為延遷每成多骨待多骨結聚拔去之凡外瘍不戒葷鮮患口難斂則膿凝結於內日久堅硬遂為多骨疔症復腫疔瘡方愈遂食葷腥患處新肉薄嫩未堅每復焮腫潰穿膿水否則患頂生胬肉如釘硬治難除根瘋犬咬瘋犬與蛇咬傷口愈後多麻木不仁若咬毒復發渾身尤麻癢亂串至心則死瘋犬初咬時頭頂有紅頭髮三根以燈火照之拔去紅髮則不發忌發物麻味鑼聲不敬鬼神致病凡有褻慢神祇或染邪祟或前身冤孽來纏其發內症神昏煩亂乍發熱乍不發熱夜間專言鬼神事身重串痛不能轉動眼斜少寐若生搭背對口流注止漫腫或硬堅不見根盤痛無休息潰流血水刀針深刺不疼患者後須積善早為懺悔或焚冥鏹自可挽救孔聖云敬鬼神而遠之是當虔誠以盡禮非可諂瀆以邀福也眼疾食葷生翳暴患眼疾皆受風邪蘊而化熱上擾清竅若食肉味助火生痰壅滯邪路風乘火威消耗目中膏脂或起白膜紅絲或胬肉牽攀使目無全光或至失明先服決明消翳散數帖後繼服羚羊角湯二方見後久患目疾不在此論胃絕舌鑑男女大小諸症數日間舌底滑潤舌面罩滿薑黃色或大便時下蛔蟲此胃土欲絕蟲無所附乘便時而出土乃黃色舌因土之敗氣上衝故黃四五日當亡肌肉如鐵胸腹串痛按之有跳躍之處肌肉似鐵石針刺不得入此真氣已竭血不流行則肌肉呆板速死之象足底僵疔足底初有一點頂痛漸若堅石日久亦或化膿或五六月或一二年行走頂疼按之僵硬似鐵從旁邊以刀刺開或以火針當頂烙之插降藥條拔去老根收功後忌葷腥兩月以免復發醫書未載此症時感忌貼溫竄膏藥時疫病渾身每有腫痛處暖性膏藥貼之雖用於外亦能引動內火劫陰助陽致肢體色紫膚冷脈伏神脫氣喘不旋踵而危者乳不浮腫向來體虛再加勞動太過真氣多為不足每乳下浮腫如杯初時不覺漸因動作及咳喘引痛消之不去易延癆怯不治溫病反常溫邪發即神昏不語毫不發熱或手足抽搐或一二日後稍明能言漸轉神煩微熱無汗不渴此邪直犯心胞未傳肺胃先宜看胸背有紅斑否並舌苔乾燥否小兒亦有此症溫邪一起遂妄躁狂奔語言煩亂坐臥不安或舌苔燥裂生刺此熱勢炎甚擾動心胞陰虧無以上濟進救陰方得脈靜神安舌潤可治如狂暴依然乃心神散越陽離陰竭治之何功龜頭皮裹大人小孩龜頭有皮裹包只留細孔小便難瀝以骨針插孔內逐漸撐大若皮口稍大用剪刀將馬口旁皮用鉗子鉗起量意剪開速止其血或用細針穿藥線在馬口旁皮上穿過約闊數分後將藥線打一活抽結遂漸收緊七日皮自豁則馬口可大矣癰疽腫硬如石癰疽初腫即硬如石或漸大或不大誤用刀針便血流不止或淌清水患口翻凸難治投平肝補脾法猶可延年潰癰治潰癰日久難斂倘孔內老膿成多骨須降丹條提去方收口有膿血去多氣血虛不斂者有甫收口皮肉尚嫩遂勞苦太早復腫潰流清膿或臭汙水皆脾土傷敗須培補節勞欲可瘥有潰久穿通骨筆成漏無治者癰疽正氣虛癰疽浮腫如棉皮色如常大如杯或發盤痛無休止治療不應此氣虛血竭所以絡脈阻滯作疼忌刺刀針若潰流青黃水或淌黑血腫痛仍在或患口翻凸或腫消不收口者延久食少形削皆無法施食疸病發時及病後脾胃甚虛不戒食物則中焦多停滯極難消化遏伏化熱生濕生痰脾胃為倉廩之官痰聚濕蒸猶乎盦醬曲然無能外泄溢於肌膚使面目肢體皆黃宜化滯滲濕法交節令發舊病曩時所患諸病雖皆暫退每遇交節前一二日舊病照常復發或加沉重蓋天地換節氣萬物為之變色人身臟腑亦因氣候而觸其舊病傷處而生病治更較於初起難愈者或臥病不救者病似癆怯男女幼年過勞壯時心境不遂至老來未有他病只微寒不發熱胸悶常不思食神安力怯少食腹便脹此向來精氣衰微今加中宮生化之源欲絕不過久延而已腎絕死病凡男婦稍發熱頭暈舌即干短言謇神清不渴飲投救陰法熱退舌潤但形神削脫此真陰先絕淨陽欲離數日之壽耳虛暈元氣素虧之體若作勞太過或負重忍飢或氣腦傷中或病後不慎或房欲過度或多思深慮或大暑大寒時遠行並煩勞皆損人精氣豈非虛中加虛故每昏暈猝倒無寒熱表象無吐瀉里患須大補益方以培真元赤遊丹小孩生下數日渾身發紫紅塊大小不一走散極速為赤遊丹急砭去惡血可救或高腫如癰一二日即成膿速宜刺放遲則內潰因在胎中受父母熱毒生下外熱觸動而發也小孩頭顱浮軟非癰小孩之頭顱每浮軟如杯或如碗按之不痛若癰毒一按即疼頗似癰疽膿熟之狀此先後天皆虧或久病傷氣氣傷無以固血血虛無以輔氣所以氣不上升血瘀而腫誤用刀針則血出不止立危以益氣固陰湯方見後緩治自然頭皮堅硬脾虛身面淡黃胃主容納脾主消化居人身中屬土色黃蒸腐水穀分別清濁而行升降以生氣血而助精神一失常度即易生病身面虛浮而色淡黃如目珠不黃並非黃疸病乃脾虛補土為治爛皮毒癰皮膚焮腫似癰按之不堅或發如痘皮爛水淌作疼發寒熱倘貼膏藥及誤敷藥立串爛流水名爛皮毒癰不可水洗以生石膏黃豆炭川柏末烏梅炭研細川蜜米醋和敷皮膚串痛周身皮膚作痛不止串走不定並不浮腫此氣滯血燥經絡閉塞不通不治之症肋疽脅肋初來隱痛乍輕乍重隨後高腫潰流血水久不收口恐醫無效小兒潰疽哭則淌血小兒生外症已潰膿口稍逆其意則啼哭擾動肝火牽引血脈使血自患口湧出不須以藥止塞安慰其不哭則血自止肝鬱筋梗鬱悶傷肝肝主筋位部於左每有肚臍左邊相離寸許梗起一條粗筋如箸隱於皮內日夜跳躍上下串痛或作或止刺以艾針數次可止痛內投蔥白丸方見後倘皮肉僵硬針不能入只延留月日而已黑殼刺下疳勞苦之流先受濕熱之毒復與不潔婦交致玉莖先腫痛後生黑芒刺外皮包住其形似毛慄之殼內進瀉肝湯外敷清疳散二方見後甘疽內潰左右乳上堅腫皮色如常由氣悶而成者多或由血瘀者或由肺氣不降者消之不去潰膿極遲若膿向口鼻出者無妨惟綠色臭膿者無救內膜穿破癰疽釀膿日久未泄先穿內膜後始外潰雖不作疼不見凶象惟潰口似蟹咋沫百無一生乳心堅腫婦女乳心堅腫先小後大寒熱不退痛不止不焮紅延至日久方潰膿水因此症成癆者有之矣虛人勞動痿症肥人多氣虛及體弱之輩或病後未復元突有勞動傷損經脈手足因之軟痿不得舉動須緩用大補氣血自效如服散藥難痊方見後病死牛肉有毒病死之牛必有毒聚之處誤食其毒處之肉遂腹痛不止無藥針治待死必矣肛脫不收肛脫日久不收則脂液必干尤難猝上乃氣虛不固內進益氣湯提下陷之氣外以熏洗方二方見後但內腸得暖可收遇冷則墜也須月餘方復原病中忌食諸豆鼓脹並諸病時脾胃必衰則消磨之權早失誤食雜豆壅閉中焦陰霾愈結清陽難升遂多喘滿不救者孕婦水腫脾虛不能約水水溢皮膚致周身浮腫名為子腫加以腹中孕孩日吸母血中氣更虛水積愈甚所以產時水下成桶產婦與嬰兒皆脫不救須未產三月前投補氣順胎方方見後直至臨產而止可保二命如產後誤補阻塞惡露生變嬰兒舌連下唇嬰兒生下舌底總筋連及下唇不能吮乳用剪刀在下唇剪至舌底總筋處而止速止其血一傷總筋血流不止則傷其命肛門皮包初生嬰兒肛門有薄皮包裹無孔用剪刀剪開薄皮以藥速止其血則肛自通病久目瞎背跎足跛手軟小孩元氣未充再加病久失調臟腑尤虧遂致目光失明或致背跎或使足跛手軟種種殘疾不如早為補救猶可不至缺陷肝癰左乳下隱疼牽引脅肋咳嗽與大便時亦痛硬腫難潰不能著左邊臥由肝氣鬱結或努力血瘀謂之肝癰以消堅散方見後肝火沖肺作咳肝經火旺上衝肺絡即木擊金鳴乃咳左關脈洪數以柔肝宣肺湯方見後陰濕鼓脹寒濕留著中焦清陽不布滿腹堅脹面黃不渴不食脈沉遲宜通陽湯方見後水泡風肝經風熱與腎經水濕搏結肌肉間先由手足發水泡延及腕脛初只爛筋後即脫骨或愈後又發每至於死宜用三稜莪朮各五錢為末分三次溫水和服虛人勞力傷氣音啞腎為聲音之根肺乃聲音之戶虛人勞力損傷元氣氣海空浮丹田真氣不與在上肺氣相接故喉啞難出聲內投金水八物湯方見後傷食症傷食症頭不大疼不甚熱胸腹飽悶只腹上亢熱以手細按之自明癰疽潰串過大難斂癰疽潰串太大難斂患上皮薄者以藥線穿貫兩頭打一活抽結每日束緊線七日自豁再以藥收口如肉厚孔深或有多骨瘀塞者量意上白降丹後用生肌法可也腎囊用刀針法腎囊腫脹成膿及濕水注於囊腫亮不速刺放即爛脫難治先以左手指推腎子上入隨以右手持刀針在腫脹下流勢之處刺放膿水若誤刺腎子立危真黃病凡黃病面目皆黃手指甲白色心須跳躍頭眩腹膨乏力脈洪數有力不必服煎藥惟進丸劑可效黨參冬朮茯苓陳皮苦參半夏煅皂礬煅針屑各藥研末用黑棗煮熟去皮核搗溶和藥為丸舌苔驗凡舌苔浮面灰黑而底面滑潤非實火傷陰乃腎氣欲絕散越於外必死不治若實火舌黑必乾燥起刺得涼藥即退黑回潤痔漏掛線法用細銅針穿藥線右手持針插入漏管內左手執粗骨針要圓禿頭鐫深長槽一條以便引針插入肛門內釣出針頭與藥線打一抽箍結逐漸抽緊加鈕釦系藥線梢墜之七日管豁開摻生肌藥一月收口如虛人不可掛線易成癆不治禁食宜辨人生皆賴穀氣入胃化生氣血以長精神半日不食則氣衰一日不食則氣少斷食七日則死惟時疫霍亂邪盛裡實食滯當禁其餘有挾虛症須得穀氣以助藥力烏可不辨一概禁與致傷人命哉迨餓極患者惡聞食味不能下咽矣要在少食淡食勿使傷食耳故傷寒時疫食滯霍亂初起若進飲食則邪氣內閉難出至病果退頭額與胸腹決不發熱正氣虛弱難以出言須灌稀米飲接補元氣一二日再進糜粥若徒恃藥力何異操刃殺人骨槽風不治症有種骨槽風潰膿後牙關仍腫閉不開或不腫閉牙根又無腫爛處患口已合只耳下有一細孔靜時並無所見每逢言笑稍流清水惟呷飲食則脂水津津不絕治亦無效乃終身痼疾踝骨疽壞症內外踝本為三陰發源之地若受陰濕及浸冷水使血脈冰凝肌肉堅腫作疼不止一起烙以火針內投溫經燥濕之方可效若日久失治更加高硬漫串恐名醫束手手臂癰疽治法手臂為三陽之部凡生癰疽最易腫串一手不可輕用刀針只宜先敷對病之藥過三日一換待根盤收束膿水已成始可開放煉升藥法用火硝明礬各一兩研末入小鐵鍋內以炭火化開待轉成乾硬結於鍋底再加入水銀一兩在硝礬硬胎上後覆一大碗於碗內又以棉紙條蘸鹽水塞緊碗四圍勿使走氣復用沙灰護碗半截用秤錘一個壓住碗底以棉花少許置碗底先文火後武火升三炷香時看棉花焦黑是藥已成熄火待冷揭碗刮下藥聽用降藥不痛配法陳降藥五錢生半夏三錢蟾酥一錢上各研末或用糯米飯捶溶和作條聽用不覺痛用刀針宜審癰疽之膿未熟不可輕動刀針破傷出血反使腫痛毒氣走散加重至患上四圍腐肉已成須得爛透方可用銅鉤搭起剪刀輕緩剪去一覺痛處切不可剪再待腐熟剪之至見鮮紅肉若犯動則痛作血流尤難收口慎之針灸飲酒忌症凡紅腫焮痛外症最忌火針艾灸並飲酒漿不然助火串毒更痛腫異常疔瘡尤忌犯之便走黃延腫不可治療合藥說外科應用諸藥總宜現配現用氣力始足易於去病若是陳久失其本性鮮能應效豈不誤人獨降藥愈陳愈妙驗肺癰法咳嗽有日口乾喉燥舌下生細粒胸膈微痛延遷痰帶白膿腥臭味流注初起治法風寒與痰濕走竄脈絡結為流注愈者將愈發者又發延綿不已多進陽和湯可效若皮色紅者不可用熱藥附方熟地一兩白芥子二錢研鹿角膠三錢肉桂一錢炮姜五分麻黃五分生甘草一錢乳岩加土貝母五錢陳酒一杯癰疽驗膿法放膿拔刀用響銅打成臨時以右手大指與食指掐住刀口向上臥刺方不傷好肉要膿口順下流勢之處淺深量意口欲大則刀斜出口欲小則刀直出膿深放淺則內膿不出反泄好血膿淺放深則內膿雖出好肉已傷輕捺病處便痛皮熱重者膿淺而稠重按方痛皮稍熱者膿深而稀遍捺患上有一點軟陷不起者或皆硬不痛者膿未熟或瘀血若放早必傷氣血而膿難成捺之軟而即起者或皆軟不痛者膿己熟或濕水若不放則腐爛深而瘡難斂腫高而軟者發於肌肉放宜淺腫低而硬者發於筋脈放宜深腫平皮色不變者毒著於骨當火針烙之體虛者先補而後放有起一二日皮色照常已有膿者或十數日皮色紫黑尚無膿者有數月之久仍須刀放者亦有不待放而死者故用刀針宜審潰膿難斂處兩乳上下處並膻中心窩以及肚臍之上一發外瘍潰膿後不易收功乃氣脈升降要途而精血難停於助長也頸斷治法人之頸項中有二管或自刎與刀傷若斷前管為食管可治先止其血摻生肌藥貼以膏藥外用布條纏好常令仰面靜臥勿語頭後墊高要使傷口合住不可離開過三日上藥一次每日用米粉做細圓子吞食不可飲湯水及齒相呷月餘全功若斷後管為氣管立時殞命盤舌癰滿舌腫硬難於語言進食為盤舌癰由濕火熏灼心君而然內服犀角湯待五六朝看舌上中心起高點以刀刺出血又刺舌下或出膿血自可漸鬆肛癰辨肛門四圍紅腫作痛速宜涼血利濕藥消之若消不去一處出膿者為肛癰每易成漏有數處潰開者名盤肛癰甚至大小便不通須早順下流勢之處開門免使潰大淌糞不可收拾如在大小便之介中處潰孔者即海底漏極難收口總當培養本元外插提膿藥往往獲痊者不一而足惡阻似病只順胎即平婦人月經若閉至四五十日遂覺頭眩目昏身困重常懶怯胸悶嘔吐痰水虛者尤甚不欲飲食或擇食物嗜臥面色如故脈緩滑每誤認是病治多不效抑知經停血虛則胎氣上逆中焦為之壅塞是惡阻也須順胎方數劑乃安當歸白芍枳殼蘇梗香附厚朴木香陳皮有寒加砂仁有熱加黃芩辨痿症有小兒忽軟弱無力手足不能舉動初無寒熱亦無痛腫若痹症應有隱疼至大人亦每有之乃陰虛熱蘊上熏肺金使肺葉焦損則生痿躄失治遂成廢人須養陰清熱徐圖自效附方熟地制首烏生龜板女貞子丹皮黑料豆阿膠生白芍沙苑子北沙參時邪四季辨醫者不先辨症施治何能取效即如冬令之傷寒始由足經血分傳入氣分脈浮緊無汗惡風先惡寒後發熱是也傷風有汗惡風脈浮緩也其餘傳變諸症張長沙已詳言之以及治法備載傷寒書中若夫時邪始由手經氣分傳入血分右脈洪數過於左脈若脈沉弱為陽病陰脈多不治亦先惡寒後發熱其熱自內達表午後熱甚頭痛煩悶初宜辛涼透表輕劑可得戰汗而解汗後脈靜者生煩躁脈疾者死國朝葉君天士卓識炯見補千古之未備須玩索其書而有得焉蓋初春所發者為春溫若鼻塞咳嗽聲重濁煩悶為風溫當輕疏其邪至春末夏初而發者為溫邪以溫者熱之漸也交夏至後發者為熱病此時病端雜出當細辨明李笠翁不云乎使天只有春秋冬三時而無夏則人之病也必稀以天時熱盛則損人元氣人之皮毛因而虛張百病易於乘機而竊發熱病者微惡寒後發熱頭痛煩渴或起病即壯熱或數日後現斑點者若傳染諸人者為瘟疫也若頭重鼻塞咳嗽微煩熱者風暑也當輕疏風邪兼解其暑若發熱畏寒頭重煩渴汗大出脈虛者靜中傷暑也宜香薷飲又有勞苦烈日中而得者為中熱身熱而痛大汗煩躁宜審虛實用藥更有每逢立夏後似乎有病右脈虛大微發熱身倦頭昏煩悶不思飲食者疰夏病也當清暑益氣湯若頭如裹痛四肢沉困身重板痛胸痞縱病有日舌不幹燥因天之炎暑一盛地之濕氣上升暑濕交併著於人身由初夏所發者始名濕溫直至秋末乃無此病他時不得混稱也治莫妙於三白湯夫初秋所發者為秋邪治病莫難於此時以天地之暑濕久伏人身新涼甫臨人之毛孔驟為收密則外涼引動內邪所發之症治難速效一不得法便入險途若秋時過於旱燥便出咳嗽發熱名秋燥症當清燥救肺湯乃燥能生火刑剋當令肺金而成病也到深秋而發頭痛煩渴面赤者謂之伏暑晚發更屬遷綿須法活心靈方可見功每逢冬令固多傷寒設冬當寒而反溫感此溫厲氣而發者遂為冬溫不宜辛熱藥劫散只須輕宣其表至於時邪初起即壯熱神昏譫語或懶言神倦或微發熱不識人皆由正虛陰弱而熱勢擾亂神明者此猶可治若見病即神昏不語手足抽搐牙關緊閉者或一病即見斑點者或有病三四日出斑不多過二三日又發斑比前更密者此皆難救有起病神清至七八日後忽神昏妄語暴躁不安者此邪犯心胞惟仲景復脈湯去肉桂滋其化源兼至寶丹或紫雪丹三分涼水和服藉辛香通竅逐穢或有效者若有病數日忽氣喘邪熱熏肺呃忒腎氣下竭手足掣搐邪熱傷肝肢冷熱陷陰分牙緊舌苔灰黑不幹燥腎陰欲絕凡得此者速死之候多發於體虛之人也若病至六七日發熱腹滿拒按大便閉小便澀或神昏譫語脈沉數有力者當承氣湯下之腑氣一通其病可解梅毒喉疳喉症有難辨不可不辨者凡男婦臟腑內蘊梅毒周身雖未現瘡點及小孩胎中受遺毒忽發喉痛不甚赤腫帝丁四面便爛幾處白腐深孔病者自昧不知醫者須詢其染梅毒否得其病根治始有效內進苦寒藥清降其火外以冰硼散少加輕粉升藥乳吹遲則損落帝丁隨穿鼻孔並連唇口爛開每使傷命或爛透囟門為開天窗變成破相若癆症之虛火灼肺雖喉疼只爛浮皮無深孔多不治如風熱喉症其爛處在喉兩旁耳癰疽逆象癰疽潰經日久不得收功患口日見凸陷翻花或小者如梅如李或大者如碗如盤僵硬作痛瘡勢可畏或膿水腥臭逼人難近或患上起有白腐厚皮然後皮面又生密密芒刺及變一切奇形怪狀世所罕見者皆罪孽所致無藥可療總歸延遲月日而已瘋犬毒述效野每逢夏令多出土灰蛇其穴外有蛇吐毒沫犬之口鼻一觸其毒遂成瘋狂亦有因食臭屍或飢餓太過而瘋者倘人被咬破傷或止咬衣服皆有毒內犯即作犬吠聲數日乃斃有一月或二月如覺周身麻木神氣昏亂或見飲食嗅鼻有聲者雖多治法未有能生者乳心疽婦女乳中心生結核初如梅漸如李不大痛延久始能化膿名乳心疽若寡居室女便成乳岩並男子患此均難治當以化堅湯多服黨參當歸青皮玉竹香附殭蠶白芍佛手鬱金鐵鉤入肛門長鐵絲魚鉤插入肛門鉤之背必圓可入內而鉤尖向外鉤住內肉拖之難出痛苦無休用細竹子照患者肛門之大相等打通竹內節為空管長尺許削光竹一頭將管套入在外之鉤柄送入肛門內使鉤尖收入竹管內再拖出竹管則鉤隨管而出虛人外症當補若陰疽外宜隔蒜艾灸法以回陽老人與體虛者生癰疽搭背對口諸瘡雖外皮紅硬不甚高腫脈浮大無力或脈沉弱蓋由真陽式微浮火發越於外先宜荊防敗毒散數劑或衛生湯疏散其邪隨後不可拘諸瘡屬火一用補藥助火閉邪擁毒難出抑知前賢審症果虛非藉參耆補氣歸芍養血少加附子肉桂蒸釀元陽扶正托毒多易內陷不能全功或有陰虧無以斂陽者須陽八味法滋陰以煦陽倘是實火脈必洪數有力煩渴便結者當服內疏黃連湯惟疔瘡梅毒始終無用補之理小孩不可食孕婦乳女子二七天癸至月事以時下凡至有孕則癸水內壅以養胎迨生孩後上行為乳汁後再有妊前余之乳汁遂為胎氣蒸遏悉化熱毒清水小孩一吮此乳必變內熱面黃便瀉常哭諸病大小便結脹及腎囊腫亮老人及病久者大小便結脹難行乃虛氣下陷不能泌別糟粕運騰水濁而出下竅若陰囊玉莖腫亮不消者是脾傷無以約水下注於囊如此之症莫冀其生用藥宜審分兩為先小兒之體最嫩服藥分兩較大人當用藥一錢者只可二三分以次加減如藥味過大樹皮草根船小何能重載反損真氣至老人與體虛者縱藥可合機亦宜小其劑數以其氣質本衰無能抵禦藥力宣達臟腑充貫脈絡易使氣壅胸塞嘔惡神傷未收本病之效先發變端合機之藥尚如此不合病之大劑其不至誤人果誰信哉故分兩不可不慎且古之一兩乃今時七分六釐簡編久載古人稟賦強實每用一藥不過數分每服一方尚分數次而今運會日下人身較於古時倍見孱弱無如醫者漫喜大劑浪投不辨症之虛實不究分兩之重輕任情率意恬不自悔病家昧於不知罹其夭札者不一而足何啻暗中以刃殺人惜未經人發明者良足致慨倘病陰寒非大溫劑不足以回其陽大時熱非大涼藥不足以救其陰驟脫症非重用參耆不足以接其元陽與夫壯實之輩非輕劑所能勝其病又非可一例論也龜背症治法龜背症起於小兒筋骨脆弱加以先天不足或病後失調或跌傷碰損大人腎虛腰痛每成此症由脊骨第一節數至第十四節下兩傍各一寸五分為腎俞穴入之兩腰乃腎經發源即在此一點先天生命所繫陰陽之變化出焉今十四節椎骨腫凸如梅痛連腎俞使腰屈而不能直久則腫大傴僂不治乘初起用長尺許寬五寸布膏藥再摻觀音救苦膏末藥方見青囊集於上外貼腫處連兩腰眼半月一換內服方看體質虛實輕者半年重者一載屢效此法亦可治雞胸痰癰疽潰後能收功不能收功法凡癰疽潰後腐肉漸盡患口大者尚流厚黃膿礙動患底之肉即流鮮血口小孔深者必插藥捻插至見紅血者以及日久漏管既經提拔膿管已去後插生肌藥亦覺肌生血見者俱可收功於遲早以上各症或潰淌稀膿汙黑汁或流黃水白漿者是氣血早傷肌肉腐敗陰陽之機不能鼓盪其生髮無功於無中為有安望斂肌完口可指日而待哉肛門內生蟲奇癢素來濕盛熱熾者或嗜酒生濕或喜食辛辣之物熱結臟腑之內日久皆能盦伏生蟲流入大腸盤踞肛門奇癢異常雖服煎藥外施熏洗終不見功今有驗方列下杏仁二錢輕粉一錢黃連二錢蕪荑一錢蛇床子二錢花椒一錢朝腦一錢枯礬一錢黃柏三錢共研細末用黑棗肉同搗爛做如筆桿粗約長寸許曬乾外裹絲棉以棉線一根繫緊藥條端打結插入肛門內留線拖於外一日一換數日除根濕邪困脾人受濕邪內困肢體便覺頑重無寒無熱面色不澤精神委頓一見飲食心中即泛泛欲嘔不飢不食日久難退此當專責之於脾不關於胃蓋脾喜香燥燥脾則濕去猶之地上濕潤一得日照風吹其濕立干非比胃經濕熱宜滲宜潤至濕滯於脾尤不可用補膩以窒悶中宮者也治方附後炒焦赤苓三錢焦苡米三錢焦神麯三錢焦扁豆皮三錢焦澤瀉一錢焦冬瓜子三錢焦茵陳錢半焦車前子三錢引用焦陳米一酒杯布包煨不先辨症亂用藥引男女春日所發之病有春溫風溫夏時發者有暑熱斑疹濕溫霍亂秋季發者有秋邪冬令發者有冬溫以及小兒痧疹凡由風熱而得者總宜先以輕平之藥疏達氣分不難隨手取效奈世俗不究病之陰陽即遇陽症猶投陽藥更喜常用青蔥生薑為引不知蔥性溫散傷陰姜味辛熱耗氣使人藥甫入腹旋增煩躁昏蒙譬如抱薪救火竟變輕病為重重病入危尚然執迷不悟比比皆是將必歸咎病起不治非人力可為豈不冤哉眼中生翳舐法眼中生翳用點消藥不能去者須用一人先以清水漱口次將舌尖在眼翳上輕輕舐之不可過重防傷脂膜約十數下再以清水漱口復輕巧舐之如此十數遍每日無間以翳舐淨為度絕效之法但月日太久之翳舐之無功初起翳膜薄嫩者舐之多消止血湧射法勞苦之輩手足前後廉每有粗筋梗起或筋累累盤曲果若是而生外瘍者不可誤用刀針刺損其筋使血湧出立時殞命蓋筋主於肝肝藏血人身血管與筋相通倘逢破傷血射而用止血藥不應者速用大缸盛入冷水令患者破處浸在水中再加棉花捺緊患口不使血流約半時許則血自止故血脈得寒逼則凝澀不行遇熱迫則衝擊而散決也待血已停再以應用之藥而治凡血出難止者皆可行此法救人被跌壓法人有突從高處墜下者或被重物壓磕者若損傷筋骨不在致命處雖昏沉無語或軟弱難動只要胸口尚溫手足未冷速用兩人扶起患者攙其兩手緩緩行走兩時之久因其跌壓使氣閉血凝一經走動則氣血可以運行漸次回生倘棄置不問則瘀血奔心必死而輕者血停胞絡成為癡駿至於骨斷出筍者須按整骨法施治腎囊癰爛落卵子可治常見濕盛熱重之人下注於腎使子囊腫痛潰膿竟至爛脫卵子者或單或雙不可棄而不治內進利濕清熱藥外摻二元散方見青囊集月餘皆可完全獨猝被傷破卵蛋者立死應用諸方消漏丸治濕熱盛成痔漏生地苦參銀花地榆槐米胡黃連川柏龜板補肺養陰湯治雞胸症熟地玉竹百合山藥貝母阿膠白芍北沙參沙苑子引梨肉熱甚加麥冬枇杷膏沖服益陰煎治龜背症熟地巴戟天破故紙淡蓯蓉杜仲杞子菟絲子山萸覆盆子引葡萄肉鹿角霜枳殼梔子湯治食復枳殼梔子仙遺糧散治楊梅瘡土茯苓銀花靈仙川柏知母白菊花蘆薈胡黃連羌活獨活龍膽草槐花引陳酒火毒重者加芒硝大黃虛者加人參三白湯治濕溫杏仁苡仁通草滑石鬱金厚撲半夏豆豉龍膽瀉肝湯當歸黃芩梔子木通龍膽草澤瀉柴胡生地車前子生甘草羚羊角散治鼻痔知母生石膏梔子羚羊角元參麥冬蒼耳子黃芩補肺益脾飲治虛火鼻衄黨參玉竹山藥白朮百合黃耆淮牛膝當歸引大棗普濟消毒飲治蝦蟆瘟桔梗薄荷馬勃柴胡殭蠶升麻黃芩荊芥養陰潤燥湯治似痹非痹鉤藤制首烏阿膠白菊花當歸丹皮生地白芍沙苑子元武板女貞子絲瓜絡清肝化痰丸治瘰癧生地丹皮海藻貝母柴胡昆布海帶夏枯草殭蠶當歸連翹梔子牛桔湯治鵝口瘡牛子桔梗薄荷葛根象貝柴胡生甘草枳殼六味加肉桂湯治虛火牙疳熟地丹皮山藥茯苓澤瀉加肉桂少許或加人中黃消堅散治痞塊歸尾桃仁厚僕三稜莪朮乳香沒藥玄胡索地慄粉水紅子蜣螂建曲推行散治腿足濕熱茵陳苦參炒木通川柏炒當歸防己丹皮獨活車前子藥粉治注痰潰後不斂黨參山藥百合茯苓白朮生耆玉竹當歸蓮子將藥曬脆加炒熟粳米數升和藥磨末每早加洋糖調食生麥益陰煎治虛火致口舌牙根破爛生地炭麥冬炭北沙參元參炭元武板人中黃熟石膏黑料豆清肺飲治鼻淵生地生石膏麥冬知母梔子黃芩蒼耳子丹皮川芍引豬膽汁防己湯治腎氣遊風蒼朮川柏炒防己苡仁獨活赤苓防風萆薢豨薟草車前子祛風丸治赤白遊風苦參當歸白蒺藜熟地羌活獨活靈仙大胡麻制首烏蟬衣火麻仁天麻紫浮萍黑芝麻研末白蜜為丸當歸拈痛湯治濕腳氣苦參炒海南子當歸茵陳獨活木通防己川柏炒蘇葉蒼朮知母木瓜涼血清燥湯治乾腳氣熟地阿膠白芍川柏炒當歸丹皮茵陳鹿銜草元武板女貞子補腎湯治腰痛成龜背症當歸熟地菟絲子杜仲破故紙巴戟天山萸杞子山藥淡蓯蓉淮牛膝葡萄肉清熱內消散治痔瘡初起生地銀花槐花澤瀉胡黃連地榆苦參川柏丹皮平肝散治上格當歸佩蘭鬱金桔梗香附玫瑰化白芍木香陳皮柴胡枇杷葉炙犀角地黃湯治牙根出血不止生地丹皮犀角白芍麥冬決明消翳散治目生翳荊芥蟬衣桑葉蕤仁木賊草石決明穀精草白菊花青葙子羚羊片散羚羊角夜明砂草決明木賊草桑皮木通丹皮赤芍歸尾益氣固陰湯治小兒頭軟塊黨參玉竹白朮熟地川續斷沙苑子杞子黃耆炙當歸白芍蔥白丸治肝氣筋梗歸尾枳殼厚朴青木香三稜蘇梗玄胡索香附青皮沉香清疳散治下疳青黛三錢掃盆二錢川柏末五錢柏油八錢麻油一兩燉溫和勻入藥末攪勻搽之益氣湯治肛門下墜當歸黨參白朮陳皮柴胡黃耆炙升麻甘草炙紅棗熏洗痔瘡脫肛方蛇床子明礬烏梅槐花地榆防風青蔥煎滾先熏後洗柔肝宣肺湯治肝火沖肺咳石決明羚羊角丹皮白菊花白前杏仁蘇子桑葉象貝枇杷葉通陽湯治寒濕鼓脹茯苓附子乾薑草果陳皮厚朴車前子椒目金水八物湯治喉啞因傷氣北沙參玉竹山藥白朮黃耆百合桂元肉燕窩補遺方白虎湯治時邪熱甚大渴舌燥生石膏知母甘草粳米生脈散治暑傷氣弱西洋參生地麥冬五味炙甘草湯治時邪昏陷甘草炙西洋參生地麥冬阿膠火麻仁大補氣血湯黨參黃耆當歸玉竹白朮杞子白芍山萸杜仲淮牛膝桂元肉消堅散治肝癰鬱金歸尾玄胡索木香青皮佛手香附澤蘭殭蠶新絳豬心丸治痰火入心發狂豬心一個不下水切片焙脆研末甘遂三錢石菖蒲錢半為未用貝母三錢煎湯作丸每早以生鐵落二兩煎湯送下虛人小兒須服少許人咬方人齒每呷各物加之胃火日夜熏灼其毒甚重凡被咬之處最易腫爛作痛黃升藥五分生石膏三錢人糞炭二錢黃連末一錢乳至無聲摻咬處外貼膏藥三日一換玉莖生黑刺方柏油八錢麻油一兩青黛三錢掃盆二錢黃柏五錢研末同油和勻搽之吐血神方雞血藤膏二錢三七一錢茜根錢半煎服輕者一帖重者三帖除根香薷飲香薷扁豆厚朴茯苓清暑益氣湯黃耆黨參白朮蒼朮神麯青皮陳皮甘草麥冬五味當歸黃柏澤瀉升麻葛根清燥救肺湯杏仁麥冬生石膏甘草火麻仁阿膠桑葉條參枇杷葉復脈湯炙甘草西洋參火麻仁生地麥冬去肉桂承氣湯大黃芒硝枳實厚朴荊防敗毒散荊芥防風羌活獨活柴胡桔梗枳殼黨參茯苓甘草神授衛生湯羌活防風白芷紅花歸尾角針乳香甲片花粉連翹銀花甘草內疏黃連湯黃連當歸白芍桔梗黃芩薄荷連翹山梔木香甘草陽八味湯熟地山藥萸肉茯苓丹皮澤瀉附子肉桂消痔漏神方每日用黑棗十六個或二十個每個剖開去核填滿棉子仁外以線紮緊煨熟清早食之月餘收功
