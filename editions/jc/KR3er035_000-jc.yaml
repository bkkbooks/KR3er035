body:
  text: 附載採集先哲察生死秘法頭部頭低無神者死頭低視深者死頭搖不止者死頭上攛者死頭重視身者死項筋展長者死聳肩動形者死面部天庭光潤者傷風天庭晦暗者傷寒面青黑者為寒面紫黑者為熱發汗後面赤甚者邪未出當再表散陰盛格陽面赤者為戴陽當溫之五色精華盡發於外而內無所畜者凶面赤目上視者死面黑頭汗出不流者死面淡黃者脾胃傷肢痿腹脹面黃如熏者濕盛黃疸面黃如橘者多熱面黃挾青紫者脈芤瘀血在胃或脅有塊面多白點者蟲積面黃不潤多蟹爪紋者蟲積面黃不一者食積面赤目黑者死面黑目黃者死面黃白眼胞腫者谷疸胸痞面黃目青者傷酒面目有黃色者有胃氣吉面赤吐沫者死面青伏枕者死顴赤者心痛左顴赤者肝熱病右顴先赤者肺熱病兩顴赤色如指大者病小愈必死顴黃黑者腎病傷寒汗不出顴赤氣喘者死面青舌卷囊縮者死面青小腹痛者陰寒面青唇黑者死面青目黃面青目赤面青目白面青目黑者皆死病人與無病人遠望似青近看似黑者死面青者風寒面黃者小便難胸中寒面黃而光潤者濕熱及痰飲蓄血面黃而枯暗者寒濕食積面黃而黑者脾胃衰面目身皆黃小便澀者濕熱面目身皆黃小腹脹痛小便利者蓄血面黃而赤者風熱面黃目青面黃目赤面黃目白面黃目黑者皆不死面赤者風熱面赤目青面赤目白者皆死面赤脈虛數者假熱面赤脈沉細者假熱面赤脈弦數者少陽病面通赤者陽明病面頰午後赤者虛火顴現赤色者死顴及耳目起赤色者五日死面白者氣虛面白無神者病後及脫血多汗面白如搽殘汗粉者死面白形瘦身熱下血壞者死面白目黑者死面白而黑者寒痛顴現青色者死面白顴赤者死面黑目青面黑目白者皆死面黑者傷寒及勞久病面焦黑者腎熱面黑唇青者死面黑皮枯牙根露者死面黑目直視惡風者死面黑兩脅難轉動者死面黑而腫者死天庭黑者死顴與髮際鼻梁黑者五日死耳目口鼻起黑色者死面黑而腫唇焦者死病人及無病人面黑又起白色在耳目口鼻者三日死病中面肉瘦削見腮者死面無精彩不受飲食者四日死面光不暗者傷風面暗不光者傷寒面如錦紋斑者熱毒面垢如油喘促多汗者中暑面垢生塵灑然畏涼毛聳者中暑面浮腫者死失睡之人神若飢喪亡之人神色呆面赤者心熱絡脈溢面青者肝熱爪枯面黃者脾熱肉蠕動面白者肺熱毛敗面黑者腎熱齒枯面色深暗者內病與重病久病面色淺亮者外病與新病輕病目部目昏及目赤目黃者皆邪熱入里開目見人者陽病閉目不欲見人者陰症橫目斜視者死瞪目直視者死目忽不明者脫陰及脫血目青目赤目白目黑者皆凶自上視者為戴眼目黑頰赤者痰熱目睛黃者酒疸目黑行走哼聲者骨節痛甚目黑麵黃肢痿難屈伸者風痰眼下青者挾陰傷寒目黃心煩脈和者病欲愈目黃小腹脹痛小便利大便黑者蓄血目黃頭汗出者欲發黃疸兩目皆黃者病欲愈目暗黃者濕熱目赤唇焦者熱病兩目眥紅者欲發瘡疹目白睛黃者欲發癉熱目白睛黃脈沉細者陰症目眶黑者為痰目下灰黑者痰飲目睛稍定即轉動者為痰目暗者欲衄血目暗鼻燥者熱邪目濛濛者熱邪目光亂者為痰目睛不轉白珠黃者欲衄血目直視喘氣下痢者死目梢生黑氣牽入太陽者死目睛定不轉者死目無精彩牙齒黑者死目胞腫者為水目睛恍惚者死目眶陷下者死目瞳子高者死目直視肩垂者死目直視耳聾及百節皆直者死閉目惡人脈短澀者死目昏不識人目反上視目瞪睛小目睛圓正目反折者皆死目轉運者死鼻部鼻微黑者痰飲鼻色黃者濕熱鼻欲嚏不能者為寒鼻孔乾黑如煙煤者陽毒熱極凶鼻孔黑潤出冷氣者陰毒冷極產婦鼻內黑及衄血者危鼻塞口中黑者死鼻出氣多入氣少者死鼻色赤者風熱鼻尖青黃色者為淋鼻色鮮紅者留飲鼻紫暗者時病病人鼻尖山根明亮目眥黃者病欲愈無病人現黑色忽起於耳目口鼻邊者凶明堂目下青者房勞或精神不快即夜未睡鼻色青者腹痛肢冷死鼻色黃者小便難及痰飲濕熱胸中寒鼻色黃黑而亮者小腹兩脅痛及蓄血鼻色白者失血氣虛鼻色黑者房勞及痰飲水氣鼻痛者風火鼻流清涕者肺寒鼻塞流濁涕者風熱鼻鼾難言者風溫鼻鳴乾嘔者傷風鼻孔滿脹者風熱鼻孔乾燥脈浮數者欲衄血鼻孔色黑滑冷者陰症鼻上出汗如雨者心胃病鼻孔扇張者死人中平滿者死唇部唇黑痰多者死唇卷喉痛者死唇乾焦者邪在肌肉唇反舌卷者死唇燥舌乾者脾熱焦唇黑者死唇青黑者寒症唇黃者血虛唇反肉腫者死唇口生瘡聲啞者蟲積唇青舌卷囊縮者死唇吻青者死唇黃者脾熱血虛唇赤而腫者熱症唇焦赤者脾熱唇焦紅者吉唇紫者蟲積唇白者失血及嘔吐唇淡白者氣虛唇口俱黑者死唇齒焦黑者燥屎唇青人中平滿者死怒氣上衝唇青者當平肝和胃吐後唇白者當養胃調氣唇燥裂者脾熱唇口舌苔有斷紋者死唇縮氣喘者死唇腫齒焦者死唇反舌縮者死唇吊齒燥下痢者死人中反不語者死口部口中紅吐血又有痰涎而息輕者死口如魚嘴尖起者死口中氣出不返者死口噤難言者痙症及痰厥中寒環口黧黑者死口酸者肝熱口甜者脾熱及痰口苦者心熱及膽熱口乾者胃熱口臭及口淡者胃熱口辣者肺熱口咸咽乾者腎熱口有血腥味者胃熱口不知食味者津液傷口中不仁者外感口難出言者血少口張氣直出者死口張腳腫脈絕者五日死口目動搖不止者死口燥齒乾形脫者死口渴眼張譫語身熱肢冷脈沉細者死口語死者死齒部初病齒縫流血痛者胃火齒燥脈虛者胃痛齒燥無津者熱病齒焦黑無垢者死齒垢灰色者死齒如枯骨者死齒生垢發枯者死齒長發枯者死喉部喉不腫干痛難忍氣促者死喉痛頭汗出者死喉干痛無痰者死喉聲如雷及嗆食者死孕婦喉痛脈浮者死耳部耳痛耳腫與耳痛耳聾者皆膽病耳痛耳鳴者三焦病耳痛耳輪黃者類傷寒耳聾舌卷唇青者肝病險耳聾發狂者陽虛病兩耳枯焦者死耳上起青筋者肝風耳輪枯薄而青耳輪枯薄而黑耳輪枯薄而白者皆腎敗舌苔部舌潤如常未生苔者邪在表苔見白滑者邪入里白苔滑者邪在膽經白苔燥者邪熱舌苔淡白者裡寒白厚苔如煮熟色者寒積脾絕白苔中黃者邪入胃乾白苔中心黑者死白苔起雪花片者脾冷閉危白苔尖生灰色刺者十中救五舌尖白苔根黃及根黑或半邊干半邊濕者膽病半邊白苔半邊黃黑苔者危白苔中有黑點者十中救二白苔多而滑黃黑苔少者多表邪黃黑苔多而乾白苔少者多里症白苔中兩條黑者死舌尖白苔根黃苔者危舌尖與根白苔中心黑者死舌尖白苔中紅苔根黑苔者死白苔外煩躁欲坐臥泥水中脈虛大者是陰寒逼其無根之火上擾當溫之舌白色者失血白苔膩者脾熱黃苔而滑者熱未盛黃苔而乾者熱已盛黃苔生芒刺黑點者十中救二黃苔起裂瓣者胃液干舌中黃苔兩邊白苔者邪入內舌兩邊黃苔中心白苔者邪入大腸舌根黃苔尖白苔舌短縮者胃熱濕痰及宿食黃苔帶黑苔者肝熱黃苔帶紅色者小腸熱厚濕黃苔中心青紫色者陰症黃苔帶灰色者胃熱黃苔帶黑色者危外感挾內傷五六日黃苔中心干兩邊潤者裡熱未重滿舌黃黑苔燥者裡熱已甚當急潤之舌色黃者血虛舌紅者暑症舌紅極者溫毒舌紅中帶白色者寒邪舌紅中夾兩條灰色者溫疫挾寒食舌紅有黑者熱毒入腎舌紅極有黃芒刺者熱毒入胃舌中紅暈四邊黑者熱極舌紅如蟲咬者火旺舌紅生大點者胃熱挾濕舌紅有白點者心胞邪舌紅尖黑者腎虛舌紅有黑點者胃熱舌紅起乾裂紋者肝熱舌紅脹爛者濕熱入脾舌紅生白泡者火旺舌生紫瘡者火鬱舌生紅點者火炎舌紅嫩如新生望之似潤摸之乾燥者乃妄行汗下津液竭死舌絳深紅色也者熱入血分舌絳兼白黃苔者氣分邪未盡舌絳中心乾者心胃火旺舌絳望之似干摸之濕者津虧濕熱盛欲蒙心胞舌絳黏膩者穢濁舌絛光亮者胃津亡舌絳乾燥者火邪傷營舌絛生黃白碎點者欲發牙疳舌絳干縮者腎陰竭十中救二舌尖干絳者心火旺舌底絳面有白苔者濕熱遏伏初病舌便乾神清者宜扶正透邪如神便昏者不治舌邊絳中白如粉而滑者邪在表舌絳難伸者痰阻舌根舌赤者裡熱舌紫暗摸之濕者瘀血挾熱舌紫腫大者酒毒舌紫暗而乾者肝胃絕舌紫黑者陰寒舌紫有紅點舌紫帶干黃舌紫短縮者皆熱毒舌淡紫帶青而滑者陰寒舌紫帶灰黑苔而滑者邪傷血分舌乾紫如煮熟豬肝者死舌苔黑潤不發熱不渴者陰寒當溫之黑苔而燥者熱病黑苔而滑發熱者暑症黑苔生干芒刺刮去底色紅者生底色黑者死刮去又生者死青苔者寒極舌卷乾黑者熱病冬月黑苔者死黑苔舌爛者心腎絕舌根黑舌尖白者胃火犯腎舌根黑舌尖紅者腎邪白苔有黑點者胃熱舌黑而縮者肝絕舌黑生紫泡者肝絕舌心一條黑燥兩邊或白或黃者兩感症舌心一條黑潤兩邊白者表裡皆虛舌黑帶紅者腎虛挾邪舌半黑半黃或半黃半白或中干邊潤或尖干根潤者傳並之邪舌紅露黑紋數條者陰症舌外紅內黑者熱極外白內黑外黃內黑者皆熱極舌灰黑者陰邪灰黑苔而乾者熱傳裡舌灰色薄潤者陰寒舌灰黃乾裂者熱病舌灰色中有黑暈者邪入腎舌中灰黑四邊微紅者邪入大腸熱毒內傳一次者見灰黑暈一重熱毒內傳二三次者見灰黑暈二三重不治初病舌便灰色無苔者寒食痰水感冒妄行汗下二便通舌灰黑而滑或乾者虛火上炎白苔中心漸黑者熱傳裡紅苔漸黑者熱病險舌沖醬色者夾食傷寒舌強難動者危舌生干糙裂刺者危舌收斂如干荔枝肉者危舌亮如鏡面無苔者胃絕舌現人字紋者死舌藍色者肝絕舌吐出數寸者危舌吐出難收者熱極舌縮入喉難言者寒極舌短者宿食危舌腫大者熱極急砭之舌硬者為痰危舌枯縮者心絕舌瘦而長者心絕齧舌者死餂舌者危舌卷神昏者危汗出不流舌卷者死傷寒舌吐出者死身部病人身輕能轉側者為輕身重難轉側者為重身重難移惡寒肢腹痛自利閉目怕亮不欲見人者陰症身痛如被杖身重如山難動者陰症身輕易動發熱體痛骨節痛者表症身重骨節腫痛難伸動自汗者風濕身重痛骨節不活者濕痹手足抽搐身反向後者痙病身目皆黃者黃疸身如蟲行者表虛肉動筋急汗多者氣虛臂多青筋者失血手背熱與背上熱者外感手心熱與小腹熱者內傷渾身惡寒者傷寒背稍惡寒者氣虛足冷而暈者氣虛發熱而暈者熱厥背曲肩垂者腑敗腰難轉動者腎敗形肥白者夭形黑瘦有神者壽形肥者邪氣實形瘦者邪氣虛肥人氣虛生痰難以周流痰凝生火故多中風暴厥瘦人陰虛血少相火易亢故多勞咳病人形瘦喘促狂亂者死形肥大皮膚寬緩者壽形肥大皮膚緊急者夭血實氣虛者則肥氣實血虛者則瘦肥人耐寒不耐熱瘦人耐熱不耐寒胃經氣血旺者髯美而長胃經氣血弱者髯少胃經氣血不足者無髯坐欲伏者氣少坐欲下一足者腰痛行遲者痹症息引胸中氣上逆者咳息張口短氣者肺痿吐沫叉手摸心閉目者心虛手心冷者腹中寒手心熱者虛火旺形肥者氣虛形瘦者氣促形肥者脈細形瘦者脈疾形潤者脈澀形澀者脈滑形大者脈小形長者脈短形矮者脈長四肢不收者死身肉不仁者死寒熱往來形瘦脈澀者死喘促發熱者死鼻衄發熱者死濕痹身難動時膝後高肉破發熱者死氣虛發熱脈澀者死身重尿不止者死身反向後抽搐者死皮膚著骨者死骨肉相離者死大肉陷下者死大骨枯槁者死咳嗽尿血形瘦脈小硬者死婦