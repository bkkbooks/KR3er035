火或暴怒叫喊坐而氣促者哮喘痰火久病危中年人聲濁者痰火獨言獨語者思慮傷神氣促喘急不足以息者虛極平時無寒熱氣短不足以息者痰火辨症胃病喜冷飲胃熱者口爛心空如飢胃寒者肢冷腹脹而病腸病喜熱飲腸熱者溺黃加粥腸寒者溺白便瀉腸鳴從面先腫者陽水從足先腫者陰水若手腫至腕足腫至跗面腫至頸皆氣虛不還死症食多氣少非胃火即病新愈食少氣多非胃虛即氣逆虛熱喜熱飲實熱喜冷飲虛寒喜冷飲實寒喜熱飲人左乳下為胃之大絡名虛里穴以驗宗氣若微動者宗氣虛不動者死問因先問何等人或男或女或老或幼或婢妾童僕或室女寡婦次問得病之日受病之因飲食何如大小便何如曾服何藥日間何如夜寐何如胸膈悶脹否問之不答必耳聾再問其左右平日如何不然是病久或傷汗下致聾問而懶答或點頭皆虛昏憒不識人非暴厥即久病如女人多氣結婦人先問月經如何寡婦室女尼姑氣血凝滯兩尺脈多滑不可誤斷為胎腹脹疼問新久問喜食何味何物或葷或素或茶或酒喜酸肝虛喜甜脾弱頭身臂足作痛問曾生惡瘡否曾服何藥否孕婦生死面赤舌下脈青舌反身冷者母活子死面青舌下脈赤者母死子活面與舌下脈皆青或皆白吐沫者母子皆死面黃黑舌乾短者急刺之十中救二舌色潤則安舌色敗則死欲產之脈沉細而滑弦緊者生沉澀者死浮大者難產臨產左中指中節脈跳動產男右中指中節脈跳動產女診暴病絕脈脈兩動一止者四日死三四動一止者六日死五動一止者八日死脈不往來者死脈伏絕者死脈或遲或數者死脈變反關者半年死五實脈大發熱腹脹大小便閉昏蒙五實死五虛脈虛惡寒氣弱大小便瀉利飲食不入五虛死五運六氣全圖要訣推司天五運十年干客氣法以甲子年為例如甲己化土初客氣即土也土生金二客氣金也金生水三客氣水也水生木四客氣木也木生火五客氣火也余仿此十年干化氣主病化氣少陰君火主病瘡瘍寒熱驚惑譫語悲哀鼻衄化氣太陰濕土主病痞格中滿霍亂胕腫積飲化氣少陽相火主病瘡瘍驚躁嘔嚏矇昧喉痹耳鳴暴瀉抽搐暴死化氣陽明燥金主病浮虛鼻流清涕尻股膝足皆病脅痛鼻嚏化氣太陽寒水主病骨節不利腰痛盜汗項強遺泄化氣厥陰風木主病脅痛吐瀉肛墜筋急筋軟逐年主運主病主運木被金克主病善怒眩冒巔疾脅痛吐甚主運火被水克主病胸脅痛肩背臂痛骨痛皮膚疼主運土被木克主病善搐四肢不舉肉縮胸滿食少腹痛腸鳴便瀉足痛主運金被火克主病喘咳肩背尻股膝胕皆病吐血主運水被土克主病腹滿腸鳴便瀉食不化妄冒逐年客運主病客運木氣所克脾土受病泄瀉身重煩躁腸鳴腹脹客運火氣所克肺金受病瘧疾少氣咳喘吐血便血便瀉喉燥耳聾客運土氣所克腎水受病腹痛身重足冷煩躁客運金氣所克肝木受病脅痛胸痛腹疼目病耳聾身重煩躁客運水氣所克心火受病喘咳盜汗心煩厥冷昏亂心痛腹腫脛腫子午二年少陰君火司天主病胸煩喉干脅痛皮膚痛喘咳失血便血瘡瘍胕腫心痛腹滿肩背臂目痛肺脹嚏嘔陽明燥金在泉主病善嘔心脅痛喉干足外熱丑未二年太陰濕土司天主病骨痛痹症胕腫腰脊頭項皆痛頭眩便難飢不欲食咳血心如懸太陽寒水在泉主病疝引心痛失血喉痛頷腫寅申二年少陽相火司天主病頭痛瘧疾皮膚痛水腫瘡瘍咳血心煩下痢胸熱鼻衄鼻流清涕厥陰風木在泉主病傷風脅脹心痛喉腫腹脹善噫身重多屁卯酉二年陽明燥金司天主病瘧疾腹痛腹鳴腹痛便瀉心疼喉干腰痛㿗疝目眜瘡瘍少陰君火在泉主病氣喘腹鳴皮膚痛目下腫目瞑齒痛腹痛腹腫瘧疾辰戌二年太陽寒水司天主病善悲瘡瘍心痛失血鼻衄便血眩僕善噫喉干胸腹滿肘攣腋腫太陰濕土在泉主病飲積心痛耳聾喉腫喉痹便血溺閉腹腫痛頭痛腰膝痛難動足肚痹巳亥二年厥陰風木司天主病脘痛喉腫舌強腹脹便瀉成瘕少陽相火在泉痢疾腹痛溺血五運六氣述每年有化氣又有五主運復有五客運加以司天又加以在泉更有六氣之主氣六氣之客氣七者會聚於一時總以客氣所克者受邪若客氣是木即脾生病也余仿此歲運與司天相會合為天符如木運之歲又遇厥陰風木司天火運之歲又遇少陽相火司天乃奉天行令謂之熱法故中其病者危而速也歲運與年支相會值為歲會如木運逢寅卯年支火運逢巳午年支乃平氣而主一年譬方伯之行令故中其病者徐而持久也歲運與司天及年支三者會合如火運之歲遇少陰君火司天又遇年支是午即戊午年也土運之歲遇太陰濕土司天又遇年支是丑未即己丑己未年也如金運之歲遇陽明燥金司天又遇年支是酉即乙酉年也乃為天符歲會又為太乙天符又為貴人偏勝之時故中此偏勝之邪者暴而死也又有值其日而中其邪戊子日為天符戊午日即為太乙也脈訣纂要切脈捷訣人之鼻氣一出一入為息切脈時數之即能辨脈脈浮輕按可得浮而旺大為洪洪而有力為實浮大遲軟為虛虛大散漫為散浮大而軟為芤直硬為弦浮而弦芤為革小軟如絲為細浮細為軟細軟如無為微沉脈重按始得沉而弦硬為牢沉至著骨為伏沉細為弱一息三至為遲遲細為澀遲而一止為結一息四至為緩一息六至為數數而流動為滑數而弦硬為緊數而亂轉為動數而一止為促促而一止為代一息七至為疾過於本位為長不及本位為短寬闊為大細狹為小脈象主病浮寸風頭痛痰聚在胸關主胃弱尺浮二便不得相通浮脈表病有力為風無力血虛浮遲表寒浮數風熱浮緊風寒浮緩風濕浮虛傷暑浮芤失血浮洪虛火浮微癆症浮濡陰虛浮散虛極浮弦痰食浮滑痰熱浮細氣虛浮澀血弱沉寸痰在胸關冷脘痛尺沉腰痛遺濁瀉利沉脈里病主寒主積有力痰食無力氣鬱沉遲虛寒沉數伏熱沉緊冷痛沉緩水蓄沉牢痼冷沉實熱極沉弱陽虛沉細濕痹沉弦飲痛沉滑宿食沉伏吐利陰毒積聚沉澀血結沉主骨遲寸寒上焦關胃冷痛尺腰腳病七疝便瀉遲主臟病有力冷痛無力虛寒遲澀血少遲緩寒濕遲滑脹滿浮遲表寒沉遲裡寒冷積癥瘕數寸喉嘴病咳嗽失紅關肝胃火尺數陰虛數脈腑病主吐主狂有力實熱無力虛瘡浮數表熱沉數里熱虛數肺痿右寸數實肺癰滑寸痰嘔吐吞酸咳嗽關滑宿食肝脾經熱尺中淋濁便瀉利疾滑主痰食上為吐逆下為蓄血浮滑風痰沉滑食痰滑數痰火滑短宿食滑大陰痛滑散癱瘓血旺脈滑澀寸澀心虛又為胸痛關中脅脹尺傷精血淋濁便紅澀主血少或傷寒濕澀大實熱澀弱虛火氣旺脈澀反胃結腸自汗厥逆亡陽寒濕女人育孕胎傷無孕血敗虛寸虛血虧關中腹脹尺傷精血骨蒸痿痹脈虛血虛氣虛病弱自汗怔忡陰虛發熱驚悸傷暑久病脈虛者死實寸面風熱喉痛氣填關中胸悶尺實腰痛大便不通實緊寒結實滑痰凝脈實血實水穀為病鬱火發狂譫語頻吐陽毒傷食糞結氣痛長胃經熱重陽毒癲癇長脈屬肝宜於春長則氣旺浮長瘋癇短寸短頭痛關傷酒食尺短腰痛短脈屬肺宜於秋短主氣痛沉短宿食洪寸洪失血關中肝火胃虛脘痛尺部腎損洪主陰虛下痢失血脹滿反胃脈洪形瘦多氣者死若久咳者忌之微寸微氣急又主心驚關中腹脹尺損精血浮微惡寒沉微發熱男微虛損女微崩帶緊左寸緊傷冷右寸緊傷食關心腹痛尺疝奔豚緊主冷痛浮緊表寒沉緊裡寒緊數鬼祟喘咳瘋癇中惡浮緊咳嗽沉緊皆死緩寸緩風邪關中胃弱尺主便瀉痿痹風秘浮緩為風沉緩為濕緩大風虛緩細濕痹緩弱氣損緩澀血傷緩滑濕痰血虛氣旺芤寸芤血瘀關腸胃癰尺主便血赤淋崩漏久病脈芤者生新病脈芤者死弦寸弦頭痛胸膈有痰左弦癥瘕右心腹痛尺主七疝手足拘攣浮弦頭痛沉弦腹痛弦數多熱弦遲多寒弦大主虛弦細拘急單絃飲痛雙弦寒痼痰飲瘧疾脈弦不食者為木剋土不治革女人半產崩漏男子陰脾夢遺牢心腹寒痛疝氣癥瘕失血脈浮大者死濡讀軟寸濡自汗又主氣虛關中氣損尺傷精血骨蒸受濕寸弱氣虛關中胃弱尺主陰虛弱弱主氣虛惡寒發熱筋骨萎弱驚悸自汗弱主筋散左散怔忡右知自汗左關痰飲右主足腫尺多死象細寸細嘔吐關中腹脹尺部遺精便瀉虛冷細為氣血皆衰濕傷腰腎憂勞過度吐衄脈沉細者生伏寸伏食滯關知腹痛尺主疝氣霍亂頻吐宿食老痰脈伏因火邪內郁陽極似陰必大汗而解夾陰傷寒先內有伏寒又外感寒陰盛格陽肢冷脈伏須投姜附動便瀉拘攣腹痛驚悸女人帶漏男子遺精浮動盜汗沉動發熱促陽旺脈促促為氣鬱喘咳痰積發狂斑點肺癰熱毒結陰旺脈結氣血兩凝癰腫疝瘕老痰久停代代脈氣衰瘡疽膿血嘔吐腹痛下利霍亂跌打悶絕女胎三月脈象吉凶中風之病脈喜浮遲硬大疾實其凶可知傷寒熱病脈喜浮洪沉細弦澀症反必凶汗後脈靜身涼自安汗後脈疾熱病難痊脈陽症陰命必多殆陰症陽脈雖困無害勞倦內傷右關虛弱汗出脈疾死症可必瘧脈多弦弦數者熱弦遲者寒代散則死泄瀉痢疾沉細緩滑弦實浮數發熱則卒嘔吐反胃浮滑者昌弦數細澀結腸者亡霍亂之症代脈勿訝洪滑是順細澀可嗟咳脈多浮浮滑者生弦疾沉澀伏大者殂喘急氣逆浮滑者順沉澀疾大肢寒逆症火旺之症洪數為宜細數無神魂魄欲離骨蒸發熱洪數為虛熱而澀細必殞其軀癆病諸虛浮細虛大沉澀弦數其死可必失血脈芤緩細卻宜數實弦疾此症堪憂蓄血之病牢大可醫沉澀而細速愈者稀三消之脈數大者生短澀細散到手生驚小便淋閉鼻色現黃實大可療澀細乃亡遺精白濁遲細易治浮虛疾大危期恐至大便不通疾散者凶心腹之痛細遲速愈浮大弦疾必是延久疝為肝病脈必弦疾弦牢者生弱疾者死黃疸濕熱洪數為宜細澀口渴便利難醫脹腫痞滿浮大弦實沉細而虛岐黃無術積聚癥瘕臟腑分治實大可生沉細難愈狂癲之症浮洪不妨沉細弦實必見凶殃頭痛浮弦短澀難治汗脈細遲緊數者死昏厥肢冷沉弱可畏鬱悶之脈數滑相當沉牢弦澀此病多亡痙脈弦緊角弓反張沉伏而細病必喪亡筋脈拘急浮弱者生弦實疾大必然病增中毒腹脹細緊無妨浮大如何命乃危亡鬼祟之脈或大或小細緊何憂浮大可愁癰疽未潰脈宜洪大及其已潰短散有害肺癰數實肺痿數弱面白無神脈宜短澀浮大相逢氣血損失腸癰實熱滑數主吉沉細無根其死可測婦人之脈細澀難產浮弱血虛沉遲經閉滑疾懷胎欲產沉散新產宜緩弦實必凶血崩虛遲數大者危帶下浮弦疾實者死心絕之脈硬疾而牢一日可憂肝絕之脈硬疾而弦八日而亡脾絕之脈虛疾而散四日難留肺絕之脈短澀而散三日而沒腎絕之脈硬疾而散四日莫挽其有過期者能食故也六脈配節氣預知病訣脈得獨大小獨浮沉獨長短則病如左關脈弦大知驚蟄後有風熱之病蓋弦主風而大主熱也如右尺脈緩大知芒種後有濕熱之病蓋緩主濕而大主熱也久病之人有寸脈緩餘部滯知立冬後愈脈受剋死期心脈洪大肝脈濡弱肺脈浮毛腎脈沉滑若二月宜得濡弱肝脈反得浮毛肺脈至秋應死金來剋木秋令金旺故也
